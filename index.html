<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management System</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --soft: #334155;
      --line: #e5e7eb;
      --card: #ffffff;
      --text: #0f172a;
      --text-soft: #475569;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --app-bg: #f8fafc;
      --sidebar-gradient-end: #111827;
      --auth-overlay-start: rgba(15, 23, 42, 0.58);
      --auth-overlay-end: rgba(37, 99, 235, 0.42);
      --auth-panel-start: rgba(15, 23, 42, 0.94);
      --auth-panel-end: rgba(29, 78, 216, 0.90);
      --radius: 18px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; min-height: 100%; font-family: Inter, Arial, sans-serif; background: var(--app-bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    .app-shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .sidebar {
      background: linear-gradient(180deg, var(--bg), var(--sidebar-gradient-end));
      color: white;
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
    .brand-badge { width: 46px; height: 46px; border-radius: 14px; background: rgba(255,255,255,0.1); display: grid; place-items: center; font-weight: 800; }
    .sidebar h1 { font-size: 18px; margin: 0; }
    .muted { color: #94a3b8; }
    .nav-group { margin-bottom: 18px; }
    .nav-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin: 0 0 8px; }
    .nav-btn {
      width: 100%; border: 0; background: transparent; color: white; padding: 12px 14px; border-radius: 14px;
      text-align: left; cursor: pointer; margin-bottom: 6px;
    }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.08); }
    .main { padding: 24px; overflow-x: hidden; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .topbar .page-title h2 { margin: 0 0 4px; font-size: 28px; }
    .topbar .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 0; border-radius: 14px; padding: 11px 16px; cursor: pointer; font-weight: 600;
      background: var(--primary); color: white; box-shadow: var(--shadow);
    }
    .btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--line); box-shadow: none; }
    .btn.danger { background: var(--danger); }
    .btn.warning { background: var(--warning); }
    .btn.success { background: var(--success); }
    .grid { display: grid; gap: 16px; }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cards-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cards-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cards-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
      border: 1px solid #eef2f7;
    }
    .metric { font-size: 30px; font-weight: 800; margin: 8px 0 0; }
    .subtle { color: var(--text-soft); }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .field, .field-inline { display: flex; flex-direction: column; gap: 7px; }
    .field-inline { flex: 1 1 200px; }
    .field input, .field select, .field textarea, .field-inline input, .field-inline select, .field-inline textarea {
      width: 100%; border: 1px solid var(--line); padding: 12px 14px; border-radius: 14px; background: var(--card);
    }
    .form-grid { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form-grid-3 { display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .table-wrap { overflow: auto; border-radius: 16px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; background: var(--card); }
    th, td { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; text-align: left; white-space: nowrap; }
    th { background: color-mix(in srgb, var(--app-bg) 88%, white 12%); font-size: 13px; color: var(--soft); }
    .chip { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .chip.success { background: #dcfce7; color: #166534; }
    .chip.warning { background: #fef3c7; color: #92400e; }
    .chip.danger { background: #fee2e2; color: #991b1b; }
    .chip.info { background: #dbeafe; color: #1d4ed8; }
    .fee-amount { font-weight: 700; }
    .fee-amount.due { color: #b45309; }
    .fee-amount.paid { color: #15803d; }
    .fee-amount.balance { color: #b91c1c; }
    .fee-amount.zero-balance { color: #15803d; }
    .chat-action-icon {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:34px;
      border-radius:999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      color:#fff;
      font-size:16px;
      flex: 0 0 auto;
      margin-left: 8px;
    }
    .chat-tab-switch {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      margin-bottom: 14px;
      width: 100%;
    }
    .chat-tab-btn {
      flex: 1 1 0;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: transparent;
      color: rgba(255,255,255,0.78);
      font-weight: 700;
      cursor: pointer;
    }
    .chat-tab-btn.active {
      background: rgba(255,255,255,0.22);
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .split { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }
    .auth-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #d9d9d9;
    }
    .auth-card {
      width: min(1380px, 100%);
      min-height: min(780px, calc(100vh - 36px));
      background: linear-gradient(180deg, #f4f4f4, #efefef);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.02fr 1fr;
      border: 1px solid rgba(255,255,255,0.9);
    }
    .auth-left {
      position: relative;
      padding: 36px 28px;
      background: linear-gradient(180deg, #f7f7f7, #ededed);
      overflow: hidden;
      border-right: 1px solid rgba(15, 23, 42, 0.04);
    }
    .auth-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 11% 20%, rgba(255,255,255,0.95) 0 8px, transparent 9px),
        radial-gradient(circle at 18% 13%, rgba(255,255,255,0.88) 0 6px, transparent 7px),
        radial-gradient(circle at 26% 18%, rgba(255,255,255,0.82) 0 4px, transparent 5px),
        radial-gradient(circle at 34% 24%, rgba(255,255,255,0.9) 0 10px, transparent 11px),
        radial-gradient(circle at 45% 16%, rgba(255,255,255,0.76) 0 4px, transparent 5px),
        radial-gradient(circle at 54% 12%, rgba(255,255,255,0.7) 0 3px, transparent 4px);
      pointer-events: none;
    }
    .auth-visual {
      position: relative;
      height: 100%;
      min-height: 680px;
    }
    .auth-visual-caption {
      position: absolute;
      left: 18px;
      top: 10px;
      max-width: 340px;
      z-index: 2;
    }
    .auth-visual-caption h1 {
      margin: 0 0 8px;
      font-size: 34px;
      color: #312e81;
    }
    .auth-visual-caption p {
      margin: 0;
      color: #6b7280;
      line-height: 1.55;
    }
    .auth-scene {
      position: absolute;
      inset: 90px 10px 10px 10px;
    }
    .auth-monitor {
      position: absolute;
      left: 52px;
      bottom: 130px;
      width: 278px;
      height: 180px;
      border-radius: 12px;
      background: linear-gradient(135deg, #50586d, #1f2937 58%, #6b7280);
      box-shadow: 0 18px 28px rgba(31, 41, 55, 0.16);
      border: 6px solid #b6bcc8;
      z-index: 2;
    }
    .auth-monitor::before {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02));
    }
    .auth-monitor::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -38px;
      transform: translateX(-50%);
      width: 82px;
      height: 44px;
      background: linear-gradient(180deg, #cfd4dd, #adb4c0);
      clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
      border-radius: 0 0 18px 18px;
    }
    .auth-plane {
      position: absolute;
      left: 98px;
      top: 128px;
      width: 128px;
      height: 78px;
      background: linear-gradient(145deg, #ffffff, #dce2ea);
      clip-path: polygon(0 55%, 100% 0, 48% 100%);
      box-shadow: 0 10px 18px rgba(148, 163, 184, 0.24);
      transform: rotate(8deg);
      z-index: 4;
    }
    .auth-ruler {
      position: absolute;
      left: 250px;
      top: 58px;
      width: 52px;
      height: 198px;
      background: linear-gradient(180deg, #ffd400, #facc15);
      clip-path: polygon(18% 100%, 100% 0, 100% 100%);
      border-radius: 10px;
      transform: rotate(12deg);
      box-shadow: 0 16px 22px rgba(250, 204, 21, 0.22);
      z-index: 3;
    }
    .auth-ruler::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 8px;
      width: 12px;
      height: 170px;
      background: repeating-linear-gradient(180deg, rgba(120,53,15,0.22) 0 2px, transparent 2px 10px);
      opacity: 0.8;
    }
    .auth-bag {
      position: absolute;
      left: 330px;
      bottom: 78px;
      width: 244px;
      height: 320px;
      border-radius: 34px 34px 28px 28px;
      background: linear-gradient(180deg, #7c3aed, #6d28d9 42%, #f59e0b 42%, #facc15 82%);
      box-shadow: 0 24px 36px rgba(109, 40, 217, 0.24);
      z-index: 3;
      overflow: hidden;
    }
    .auth-bag::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -18px;
      transform: translateX(-50%);
      width: 72px;
      height: 52px;
      border: 10px solid #374151;
      border-bottom: 0;
      border-radius: 26px 26px 0 0;
    }
    .auth-bag::after {
      content: '';
      position: absolute;
      left: 34px;
      right: 34px;
      top: 126px;
      height: 118px;
      border-radius: 26px;
      background: linear-gradient(180deg, #facc15, #fde047);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.26);
    }
    .auth-bag-pocket {
      position: absolute;
      left: 78px;
      top: 88px;
      width: 88px;
      height: 24px;
      border-radius: 999px;
      background: #6d28d9;
      z-index: 4;
    }
    .auth-book-stack {
      position: absolute;
      left: 18px;
      bottom: 26px;
      width: 290px;
      height: 160px;
      z-index: 1;
    }
    .auth-book {
      position: absolute;
      left: 0;
      width: 240px;
      height: 34px;
      border-radius: 10px 12px 12px 12px;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.10);
    }
    .auth-book.orange { bottom: 2px; background: linear-gradient(180deg, #d97706, #9a3412); }
    .auth-book.white { bottom: 38px; left: 34px; width: 256px; background: linear-gradient(180deg, #fef3c7, #ffffff 58%, #65a30d 58%, #65a30d); }
    .auth-book.green { bottom: 74px; left: 18px; width: 244px; background: linear-gradient(180deg, #84cc16, #65a30d); }
    .auth-magnifier {
      position: absolute;
      left: 300px;
      bottom: 82px;
      width: 108px;
      height: 108px;
      border: 10px solid #9ca3af;
      border-radius: 50%;
      background: rgba(255,255,255,0.24);
      backdrop-filter: blur(2px);
      z-index: 5;
    }
    .auth-magnifier::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 120px;
      border-radius: 999px;
      background: #1f2937;
      right: 0;
      bottom: -88px;
      transform: rotate(-8deg);
      transform-origin: top center;
    }
    .auth-clock {
      position: absolute;
      left: 502px;
      bottom: 20px;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #ffffff 0 62%, #e5e7eb 63% 100%);
      border: 10px solid #ef4444;
      box-shadow: 0 16px 24px rgba(239, 68, 68, 0.16);
      z-index: 4;
    }
    .auth-clock::before, .auth-clock::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      background: #9ca3af;
      border-radius: 999px;
      transform-origin: bottom center;
    }
    .auth-clock::before { width: 4px; height: 36px; transform: translate(-50%, -100%) rotate(2deg); }
    .auth-clock::after { width: 4px; height: 24px; transform: translate(-50%, -100%) rotate(92deg); }
    .auth-right {
      display: grid;
      place-items: center;
      padding: 30px 34px;
      background: linear-gradient(180deg, #f5f5f5, #efefef);
      min-width: 0;
    }
    .auth-panel {
      width: min(560px, 100%);
    }
    .auth-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: fit-content;
      margin: 0 auto 28px;
      padding: 4px;
      background: #ffffff;
      border: 1px solid rgba(99, 102, 241, 0.35);
      border-radius: 999px;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.08);
      flex-wrap: wrap;
    }
    .auth-tab {
      border: 0;
      background: transparent;
      color: #4f46e5;
      padding: 12px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      color: white;
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.22);
    }
    .auth-form-card {
      position: relative;
      background: #ffffff;
      border-radius: 26px;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.12);
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.06);
    }
    .auth-form-header {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      color: #ffffff;
      text-align: center;
      padding: 20px 20px 18px;
    }
    .auth-form-header h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .auth-form-body {
      padding: 28px 34px 30px;
    }
    .auth-form-body form { gap: 16px; }
    .auth-form-body label {
      font-size: 13px;
      font-weight: 700;
      color: #5b5f97;
    }
    .auth-form-body .field input,
    .auth-form-body .field select,
    .auth-form-body .field textarea {
      border: 2px solid #d7d4ff;
      border-radius: 12px;
      padding: 13px 14px;
      background: #ffffff;
      box-shadow: none;
    }
    .auth-form-body .field input:focus,
    .auth-form-body .field select:focus,
    .auth-form-body .field textarea:focus {
      outline: none;
      border-color: #6d28d9;
      box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.10);
    }
    .auth-form-body .btn {
      min-height: 50px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      box-shadow: none;
      font-size: 20px;
      font-weight: 700;
    }
    .auth-form-body .btn:hover { filter: brightness(1.02); }
    .auth-register-scroll {
      max-height: 460px;
      overflow: auto;
      padding-right: 6px;
    }
    .auth-helper-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #5b5f97;
      font-size: 14px;
      margin-top: 2px;
    }
    .auth-helper-link {
      color: #4f46e5;
      font-weight: 700;
      cursor: pointer;
    }
    .banner { border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; }
    .banner.warning { background: #fff7ed; color: #9a3412; }
    .banner.success { background: #ecfdf5; color: #166534; }
    .banner.danger { background: #fef2f2; color: #991b1b; }
    .mobile-nav-toggle {
      display: none;
      width: 100%;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(15,23,42,0.12);
    }
    .mobile-nav-toggle .mobile-nav-icon { font-size: 18px; line-height: 1; }
    .mobile-nav-panel { display: contents; }
    .empty { padding: 30px; text-align: center; color: var(--text-soft); }
    .printable { background: var(--card); padding: 24px; border-radius: 18px; border: 1px solid var(--line); }
    .chat-box { height: 520px; overflow: auto; border: 1px solid rgba(255,255,255,0.48); border-radius: 30px; padding: 18px; background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(244,247,255,0.94)); box-shadow: 0 22px 50px rgba(80, 90, 140, 0.12); backdrop-filter: blur(14px); }
    .nav-btn-inner { display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; }
    .nav-badge { min-width:22px; height:22px; padding:0 7px; border-radius:999px; background:#ef4444; color:#fff; font-size:12px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; }
    .card { position: relative; overflow: hidden; }
    .card::before { content:''; position:absolute; inset:0; pointer-events:none; background: linear-gradient(140deg, rgba(99,102,241,0.04), rgba(236,72,153,0.03) 48%, rgba(59,130,246,0.04)); }
    .chat-layout { display:grid; gap:18px; grid-template-columns: 320px minmax(0,1fr) 360px; align-items:start; }
    .chat-layout.no-monitor { grid-template-columns: 320px minmax(0,1fr); }
    .chat-layout.monitor-only { grid-template-columns: 1fr; }
    .chat-sidebar, .chat-thread-panel, .chat-monitor-panel { min-width:0; position:relative; z-index:1; }
    .chat-sidebar { border-radius:32px; background: linear-gradient(180deg, rgba(138,92,246,0.96), rgba(74,126,255,0.92)); color:#fff; border:0; box-shadow: 0 24px 60px rgba(99,102,241,0.24); }
    .chat-sidebar .subtle, .chat-sidebar label, .chat-sidebar .chat-contact-meta { color: rgba(255,255,255,0.82); }
    .chat-sidebar .field-inline select, .chat-sidebar .field-inline input { background: rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.16); color:#fff; }
    .chat-sidebar .field-inline option { color:#0f172a; }
    .chat-thread-panel { border-radius:34px; background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(244,247,255,0.98)); border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 24px 60px rgba(15,23,42,0.08); }
    .chat-monitor-panel { border-radius:28px; background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(249,250,255,0.98)); }
    .chat-contacts { display:flex; flex-direction:column; gap:12px; max-height:680px; overflow:auto; padding-right:6px; }
    .chat-contact-btn { width:100%; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.16); border-radius:22px; padding:14px; text-align:left; cursor:pointer; color:#fff; backdrop-filter: blur(12px); }
    .chat-contact-btn.active { background:rgba(255,255,255,0.26); box-shadow: 0 14px 30px rgba(76,81,191,0.18); transform: translateY(-1px); }
    .chat-contact-title { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
    .chat-contact-role { display:inline-flex; align-items:center; padding:4px 9px; border-radius:999px; background:rgba(255,255,255,0.18); color:inherit; font-size:11px; font-weight:700; text-transform:capitalize; }
    .chat-contact-meta { font-size:12px; line-height:1.45; }
    .chat-thread-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .chat-thread-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .chat-empty-state { min-height:520px; display:grid; place-items:center; color:var(--text-soft); border:1px dashed #d7dff5; border-radius:28px; background:linear-gradient(180deg, rgba(246,248,255,0.96), rgba(255,255,255,0.94)); padding:20px; text-align:center; }
    .virtual-chat-box { height: 520px; padding: 0; position: relative; }

    function getAcademicYearLabel(date = new Date()) {
      const month = date.getMonth() + 1;
      const year = date.getFullYear();
      const startYear = month >= 9 ? year : year - 1;
      return `${startYear}/${startYear + 1}`;
    }
    function getAcademicYearOptions(existingYears = []) {
      const current = getAcademicYearLabel();
      const [startText] = current.split('/');
      const startYear = Number(startText);
      const seededYears = [
        `${startYear - 1}/${startYear}`,
        current,
        `${startYear + 1}/${startYear + 2}`
      ];
      return Array.from(new Set([...seededYears, ...(existingYears || []).filter(Boolean)])).sort((a, b) => {
        const aYear = Number(String(a).split('/')[0] || 0);
        const bYear = Number(String(b).split('/')[0] || 0);
        return aYear - bYear;
      });
    }

    function parseScore(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function clampScore(value, min = 0, max = 100) {
      return Math.min(max, Math.max(min, parseScore(value)));
    }

    function ordinalLabel(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number) || number <= 0) return '-';
      const mod100 = number % 100;
      if (mod100 >= 11 && mod100 <= 13) return `${number}th`;
      const mod10 = number % 10;
      if (mod10 === 1) return `${number}st`;
      if (mod10 === 2) return `${number}nd`;
      if (mod10 === 3) return `${number}rd`;
      return `${number}th`;
    }

    function normalizeSchoolCategory(value) {
      const normalized = String(value || '').trim().toUpperCase();
      if (normalized === 'SHS') return 'SHS';
      if (normalized === 'JHS') return 'JHS';
      return '';
    }

    function resolveSchoolCategory(value) {
      return normalizeSchoolCategory(value) || 'JHS';
    }

    function getSchoolGradingSystem(schoolCategory) {
      return resolveSchoolCategory(schoolCategory) === 'SHS' ? 'WASSCE GRADE SYSTEM' : 'BECE GRADE SYSTEM';
    }

    function getWaecGradeDetails(percentScore, schoolCategory = 'JHS') {
      const percent = clampScore(percentScore, 0, 100);
      const category = resolveSchoolCategory(schoolCategory);

      if (category === 'SHS') {
        if (percent >= 75) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'A1', remark: 'A1', interpretation: 'Excellent' };
        if (percent >= 70) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'B2', remark: 'B2', interpretation: 'Very Good' };
        if (percent >= 65) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'B3', remark: 'B3', interpretation: 'Good' };
        if (percent >= 60) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'C4', remark: 'C4', interpretation: 'Credit' };
        if (percent >= 55) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'C5', remark: 'C5', interpretation: 'Credit' };
        if (percent >= 50) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'C6', remark: 'C6', interpretation: 'Credit' };
        if (percent >= 45) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'D7', remark: 'D7', interpretation: 'Pass' };
        if (percent >= 40) return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'E8', remark: 'E8', interpretation: 'Pass' };
        return { grading_system: 'WASSCE GRADE SYSTEM', grade_label: 'F9', remark: 'F9', interpretation: 'Fail' };
      }

      if (percent >= 90) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '1', remark: 'Grade 1', interpretation: '90–100% (Highest)' };
      if (percent >= 80) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '2', remark: 'Grade 2', interpretation: '80–89%' };
      if (percent >= 70) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '3', remark: 'Grade 3', interpretation: '70–79%' };
      if (percent >= 60) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '4', remark: 'Grade 4', interpretation: '60–69%' };
      if (percent >= 55) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '5', remark: 'Grade 5', interpretation: '55–59%' };
      if (percent >= 50) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '6', remark: 'Grade 6', interpretation: '50–54%' };
      if (percent >= 40) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '7', remark: 'Grade 7', interpretation: '40–49%' };
      if (percent >= 35) return { grading_system: 'BECE GRADE SYSTEM', grade_label: '8', remark: 'Grade 8', interpretation: '35–39%' };
      return { grading_system: 'BECE GRADE SYSTEM', grade_label: '9', remark: 'Grade 9', interpretation: '0–34% (Lowest)' };
    }

    function buildDisplayGradeRows(rows = [], studentClassLookup = new Map(), schoolCategory = 'JHS') {
      const normalized = (rows || []).map((row) => {
        const midTermA = clampScore(row.assignment_score, 0, 50);
        const endTermB = clampScore(row.exam_score, 0, 50);
        const total = clampScore(row.total_score || (midTermA + endTermB), 0, 100);
        const percent = total;
        const gradeMeta = getWaecGradeDetails(percent, schoolCategory);
        const className = String(row.class_name || studentClassLookup.get(String(row.student_id || '').trim()) || row.student_main_class_name || '-').trim() || '-';
        return {
          ...row,
          class_name: className,
          mid_term_a_score: midTermA,
          end_of_term_b_score: endTermB,
          total_ab_score: total,
          percent_score: percent,
          grade_label: gradeMeta.grade_label,
          bece_grade: gradeMeta.grade_label,
          grading_system: row.grading_system || gradeMeta.grading_system,
          remark_label: gradeMeta.remark,
          interpretation_label: gradeMeta.interpretation,
          position_label: '-'
        };
      });

      const groups = new Map();
      normalized.forEach((row) => {
        const key = [row.class_name || '-', row.term_name || '-', row.academic_year || '-'].join('::');
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });

      groups.forEach((groupRows) => {
        groupRows.sort((a, b) => {
          const scoreDiff = Number(b.total_ab_score || 0) - Number(a.total_ab_score || 0);
          if (scoreDiff !== 0) return scoreDiff;
          return String(a.student_name || '').localeCompare(String(b.student_name || ''));
        });
        let displayRank = 0;
        let previousScore = null;
        groupRows.forEach((row, index) => {
          const currentScore = Number(row.total_ab_score || 0);
          if (previousScore === null || currentScore !== previousScore) {
            displayRank = index + 1;
            previousScore = currentScore;
          }
          row.position_label = ordinalLabel(displayRank);
        });
      });

      return normalized;
    }

    function deriveChatTypeFromRoles(senderRole, recipientRole) {
      const sender = String(senderRole || '').trim().toLowerCase();
      const recipient = String(recipientRole || '').trim().toLowerCase();
      if (sender === 'student' && recipient === 'student') return 'student_student';
      if ((sender === 'student' && recipient === 'teacher') || (sender === 'teacher' && recipient === 'student')) return 'student_teacher';
      if ((sender === 'parent' && recipient === 'teacher') || (sender === 'teacher' && recipient === 'parent')) return 'parent_teacher';
      if ((sender === 'principal' && recipient === 'teacher') || (sender === 'teacher' && recipient === 'principal')) return 'principal_teacher';
      return 'direct';
    }

    function chatTypeLabel(value) {
      const key = String(value || '').trim();
      if (key === 'student_student') return 'Student to Student';
      if (key === 'student_teacher') return 'Student to Teacher';
      if (key === 'parent_teacher') return 'Parent to Teacher';
      if (key === 'principal_teacher') return 'Principal to Teacher';
      return 'Direct Chat';
    }

    function chatRuleDescription(role) {
      if (role === ROLE.STUDENT) return 'Students can chat with JHS classmates in the same class and with their teachers.';
      if (role === ROLE.PARENT) return 'Parents can chat with teachers connected to their child or children.';
      if (role === ROLE.TEACHER) return 'Teachers can chat directly with their principal, students, and parents, and can monitor student to student chats in their school classes.';
      if (role === ROLE.PRINCIPAL) return 'Principals can chat directly with teachers only.';
      if (role === ROLE.ADMIN) return 'School admins can monitor student to student chats, filter by class, allow or disallow students, and permanently delete student to student messages.';
      return 'System chat is available for permitted school roles.';
    }

    function VirtualizedChatList({ messages, currentProfileId, canDeleteForMe, onDeleteForMe, canPermanentDelete, onPermanentDelete, getPresenceStateLabel, isPresenceActive, resolveProfileMeta }) {
      const containerRef = useRef(null);
      const [scrollTop, setScrollTop] = useState(0);
      const rowHeight = 168;
      const viewportHeight = 520;
      const overscan = 4;
      const totalHeight = Math.max(messages.length * rowHeight, viewportHeight);
      const startIndex = Math.max(0, Math.floor(scrollTop / rowHeight) - overscan);
      const endIndex = Math.min(messages.length, Math.ceil((scrollTop + viewportHeight) / rowHeight) + overscan);
      const visibleMessages = messages.slice(startIndex, endIndex);

      useEffect(() => {
        const node = containerRef.current;
        if (!node) return;
        node.scrollTop = node.scrollHeight;
      }, [messages.length]);

      if (!messages.length) {
        return <div className="chat-empty-state">No messages in this conversation yet.</div>;
      }

      return (
        <div ref={containerRef} className="chat-box virtual-chat-box" onScroll={(event) => setScrollTop(event.currentTarget.scrollTop)}>
          <div className="virtual-chat-inner" style={{ height: totalHeight }}>
            <div className="virtual-chat-stack" style={{ top: startIndex * rowHeight }}>
              {visibleMessages.map((message) => {
                const isMine = String(message.sender_profile_id || '') === String(currentProfileId || '');
                const senderMeta = typeof resolveProfileMeta === 'function' ? resolveProfileMeta(message.sender_profile_id) : null;
                const senderInitials = String(senderMeta?.full_name || message.sender_name || 'U').split(/\s+/).filter(Boolean).slice(0, 2).map((part) => part[0]).join('').toUpperCase() || 'U';
                const senderPresenceOnline = typeof isPresenceActive === 'function' ? isPresenceActive(senderMeta) : false;
                const presenceLabel = typeof getPresenceStateLabel === 'function' ? getPresenceStateLabel(senderMeta) : (senderPresenceOnline ? 'online' : 'offline');
                const isAudioMessage = String(message.message_kind || 'text') === 'audio' && !!message.audio_url;
                return (
                  <div key={message.id} className="chat-message-shell" style={{ minHeight: rowHeight }}>
                    <div className={classNames('msg', isMine && 'mine')}>
                      <div className="bubble">
                        <div style={{ display:'flex', justifyContent:'space-between', gap:10, alignItems:'flex-start', flexWrap:'wrap' }}>
                          <div className="chat-avatar-row">
                            <div className="chat-avatar sm">{senderInitials}</div>
                            <div>
                              <strong>{message.sender_name || 'Unknown User'}</strong>
                              <div className="chat-header-status">
                                <span className={classNames('chat-user-status', senderPresenceOnline ? 'online' : 'offline')} />
                                <span>{presenceLabel}</span>
                              </div>
                            </div>
                          </div>
                          <span className="chat-contact-role">{chatTypeLabel(message.chat_type)}</span>
                        </div>
                        {message.message_text ? <div style={{ marginTop:10, whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{message.message_text}</div> : null}
                        {isAudioMessage ? (
                          <div className="chat-audio-bubble">
                            <span style={{ fontSize: 24 }}>🎤</span>
                            <audio controls src={message.audio_url}>
                              Your browser does not support audio playback.
                            </audio>
                            {message.audio_duration_seconds ? <span className="subtle">{Math.round(Number(message.audio_duration_seconds || 0))} sec</span> : null}
                          </div>
                        ) : null}
                        <div className="subtle" style={{ fontSize:12, marginTop:10 }}>
                          {message.class_name ? `Class: ${message.class_name} | ` : ''}
                          {new Date(message.created_at).toLocaleString()}
                        </div>
                        {(canDeleteForMe || canPermanentDelete) && (
                          <div className="chat-message-actions">
                            {canDeleteForMe && (
                              <button className="icon-btn" onClick={() => onDeleteForMe(message)}>Delete for Me</button>
                            )}
                            {canPermanentDelete && message.chat_type === 'student_student' && (
                              <button className="icon-btn danger" onClick={() => onPermanentDelete(message)}>Delete Permanently</button>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function useSupabaseTable(table, select = "*") {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const lastQueryBuilderRef = React.useRef(null);

      const fetchRows = async (queryBuilder) => {
        if (queryBuilder) lastQueryBuilderRef.current = queryBuilder;
        setLoading(true);
        setError("");
        let query = supabaseClient.from(table).select(select);
        const activeBuilder = queryBuilder || lastQueryBuilderRef.current;
        if (activeBuilder) query = activeBuilder(query);
        const { data, error } = await query;
        if (error) setError(error.message);
        setRows(data || []);
        setLoading(false);
        return { data, error };
      };

      useEffect(() => {
        const channel = supabaseClient
          .channel(`rt:${table}:${Math.random().toString(36).slice(2)}`)
          .on('postgres_changes', { event: '*', schema: 'public', table }, () => {
            fetchRows();
          })
          .subscribe();

        const fallbackTimer = window.setInterval(() => {
          if (document.visibilityState === 'hidden') return;
          fetchRows();
        }, table === 'chat_messages' ? 1800 : 5000);

        return () => {
          try { window.clearInterval(fallbackTimer); } catch {}
          try { supabaseClient.removeChannel(channel); } catch {}
        };
      }, [table, select]);

      return { rows, setRows, loading, error, fetchRows };
    }

    async function getCurrentProfile(authUserOverride = null) {
      let authUser = authUserOverride;
      if (!authUser) {
        const { data: sessionData } = await supabaseClient.auth.getSession();
        authUser = sessionData?.session?.user || null;
      }
      if (!authUser) return null;
      const { data, error } = await supabaseClient
        .from("v_current_user_profile")
        .select("*")
        .single();
      if (error) return { authUser, profile: null, profileError: error };
      return { authUser, profile: data, profileError: null };
    }

    async function resolveLoginIdentifier(identifier) {
      const raw = String(identifier || '').trim();
      if (!raw) return '';
      if (raw.includes('@')) return raw.toLowerCase();
      try {
        const { data, error } = await supabaseClient.rpc('resolve_login_identifier', { p_identifier: raw });
        if (error) return raw;
        return String(data || raw).trim().toLowerCase();
      } catch {
        return raw;
      }
    }

    async function signIn(loginIdentifier, password) {
      const email = await resolveLoginIdentifier(loginIdentifier);
      return supabaseClient.auth.signInWithPassword({ email, password });
    }

    async function setCurrentPresence(isOnline) {
      try {
        return await supabaseClient.rpc('set_current_user_presence', { p_is_online: !!isOnline });
      } catch {
        return { data: null, error: null };
      }
    }

    async function signOut() {
      removeBrowserValue("sms_login_surface");
      try { await setCurrentPresence(false); } catch {}
      return supabaseClient.auth.signOut();
    }

    async function changePassword(newPassword) {
      return supabaseClient.auth.updateUser({ password: newPassword });
    }

    async function uploadFile(path, file) {
      return supabaseClient.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: true });
    }

    function AuthScreen({ onAuthed }) {
      const [tab, setTab] = useState("login");
      const [status, setStatus] = useState({ type: "", text: "" });
      const [loginForm, setLoginForm] = useState({ email: "", password: "" });
      const [registerForm, setRegisterForm] = useState({
        school_name: "", school_address: "", school_contact: "", municipality: "", school_code: "", school_category: "JHS", years_requested: 1,
        admin_full_name: "", admin_email: "", admin_phone: "", password: ""
      });
      const [superForm, setSuperForm] = useState({ email: "", password: "" });
      const [isGeneratingSchoolCode, setIsGeneratingSchoolCode] = useState(false);
      const logoRef = useRef(null);

      const buildSchoolCodeBase = (schoolName) => {
        const words = String(schoolName || '')
          .toUpperCase()
          .replace(/[^A-Z0-9\s]/g, ' ')
          .split(/\s+/)
          .filter(Boolean);

        const initials = words.map((word) => word[0]).join('').slice(0, 6);
        const fallback = words.join('').slice(0, 6);
        return (initials || fallback || 'SCH').toUpperCase();
      };

      const buildLocalSchoolCode = (schoolName) => {
        const base = buildSchoolCodeBase(schoolName);
        const seed = String(schoolName || '')
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, '')
          .split('')
          .reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
        const suffix = String((seed % 900) + 100).padStart(3, '0');
        return `${base}${suffix}`;
      };

      const requestGeneratedSchoolCode = async (schoolName) => {
        const trimmedName = String(schoolName || '').trim();
        if (!trimmedName) return '';
        const fallbackCode = buildLocalSchoolCode(trimmedName);
        const { data, error } = await supabaseClient.rpc('generate_school_code', { p_school_name: trimmedName });
        if (error) return fallbackCode;
        return String(data || fallbackCode).toUpperCase();
      };

      useEffect(() => {
        const trimmedName = String(registerForm.school_name || '').trim();

        if (!trimmedName) {
          setRegisterForm((prev) => ({ ...prev, school_code: '' }));
          return;
        }

        let active = true;
        const timer = setTimeout(async () => {
          setIsGeneratingSchoolCode(true);
          const generatedCode = await requestGeneratedSchoolCode(trimmedName);
          if (!active) return;
          setRegisterForm((prev) => {
            if (String(prev.school_name || '').trim() !== trimmedName) return prev;
            return { ...prev, school_code: generatedCode };
          });
          setIsGeneratingSchoolCode(false);
        }, 350);

        return () => {
          active = false;
          clearTimeout(timer);
        };
      }, [registerForm.school_name]);

      const handleLogin = async (e, isSuper = false) => {
        e.preventDefault();
        setStatus({ type: "", text: "" });
        const form = isSuper ? superForm : loginForm;
        try {
          setBrowserValue("sms_login_surface", isSuper ? "super_admin" : "school");
        } catch {}
        const { error } = await signIn(form.email, form.password);
        if (error) {
          removeBrowserValue("sms_login_surface");
          return setStatus({ type: "danger", text: getFriendlyErrorMessage(error) });
        }
        // Let onAuthStateChange handle bootstrap after sign in to avoid race conditions.
        setStatus({ type: "success", text: "Login successful. Preparing your dashboard..." });
      };

      const handleRegister = async (e) => {
        e.preventDefault();
        setStatus({ type: "", text: "" });

        const resolvedSchoolCode = await requestGeneratedSchoolCode(registerForm.school_name);
        if (!resolvedSchoolCode) {
          return setStatus({ type: "danger", text: "Enter the school name first so the system can generate a unique school code." });
        }

        const payload = {
          school_name: registerForm.school_name,
          school_address: registerForm.school_address,
          school_contact: registerForm.school_contact,
          municipality: registerForm.municipality,
          school_code: resolvedSchoolCode,
          school_category: registerForm.school_category,
          years_requested: Number(registerForm.years_requested),
          admin_full_name: registerForm.admin_full_name,
          admin_email: registerForm.admin_email,
          admin_phone: registerForm.admin_phone,
          requested_password: registerForm.password
        };
        const { data, error } = await supabaseClient.rpc("public_register_school_admin", { payload });
        if (error) return setStatus({ type: "danger", text: getFriendlyErrorMessage(error) });
        if (data) {
          const { error: categoryError } = await supabaseClient.rpc("public_set_school_registration_category", {
            p_registration_id: data,
            p_school_category: registerForm.school_category
          });
          if (categoryError) {
            return setStatus({ type: "danger", text: `Registration submitted, but the school category could not be saved automatically. ${getFriendlyErrorMessage(categoryError)}` });
          }
        }
        const file = logoRef.current?.files?.[0];
        if (file && data) {
          await uploadFile(`school-registrations/${data}/${Date.now()}-${file.name}`, file);
        }
        setRegisterForm((prev) => ({ ...prev, school_code: resolvedSchoolCode }));
        setStatus({ type: "success", text: `Registration submitted for ${registerForm.school_category}. School code: ${resolvedSchoolCode}. Await Super Admin approval.` });
        setTab("login");
      };

      return (

          <div className="auth-card">
            <div className="auth-left">

                  <div className="auth-plane"></div>
                  <div className="auth-monitor"></div>
                  <div className="auth-bag"><div className="auth-bag-pocket"></div></div>
                  <div className="auth-book-stack">
                    <div className="auth-book orange"></div>
                    <div className="auth-book white"></div>
                    <div className="auth-book green"></div>
                  </div>
                  <div className="auth-magnifier"></div>
                  <div className="auth-clock"></div>
                </div>
              </div>
            </div>
            <div className="auth-right">
              <div className="auth-panel">
                <div className="auth-tabs">
                  <button type="button" className={classNames("auth-tab", tab === "login" && "active")} onClick={() => setTab("login")}>School Login</button>
                  <button type="button" className={classNames("auth-tab", tab === "register" && "active")} onClick={() => setTab("register")}>School Registration</button>
                  <button type="button" className={classNames("auth-tab", tab === "super" && "active")} onClick={() => setTab("super")}>Super Admin Login</button>
                </div>
                <div className="auth-form-card">
                  <div className="auth-form-header">
                    <h2>{tab === "register" ? "REGISTER" : "LOG IN"}</h2>
                  </div>
                  <div className="auth-form-body">
                    {status.text && <div className={classNames("banner", status.type)}>{status.text}</div>}
                    {tab === "login" && (
                      <form onSubmit={(e) => handleLogin(e, false)} className="grid">
                        <div className="field"><label>Email or Username</label><input value={loginForm.email} onChange={(e) => setLoginForm({...loginForm, email: e.target.value})} required /></div>
                        <div className="field"><label>Password</label><input type="password" value={loginForm.password} onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} required /></div>
                        <div className="auth-helper-row"><span></span><span className="auth-helper-link">Forgot Password?</span></div>
                        <button className="btn">Log in</button>
                      </form>
                    )}
                    {tab === "super" && (
                      <form onSubmit={(e) => handleLogin(e, true)} className="grid">
                        <div className="field"><label>Super Admin Email</label><input value={superForm.email} onChange={(e) => setSuperForm({...superForm, email: e.target.value})} required /></div>
                        <div className="field"><label>Password</label><input type="password" value={superForm.password} onChange={(e) => setSuperForm({...superForm, password: e.target.value})} required /></div>
                        <div className="auth-helper-row"><span>Restricted access only</span><span></span></div>
                        <button className="btn">Log in</button>
                      </form>
                    )}
                    {tab === "register" && (
                      <form onSubmit={handleRegister} className="grid">
                        <div className="auth-register-scroll">
                          <div className="form-grid">
                            <div className="field"><label>School Full Name</label><input value={registerForm.school_name} onChange={(e) => setRegisterForm({...registerForm, school_name: e.target.value})} required /></div>
                            <div className="field">
                              <label>School Code (Auto Generated)</label>
                              <input value={registerForm.school_code} readOnly placeholder="Generated from school name" required />
                              <small className="subtle">{isGeneratingSchoolCode ? 'Generating unique school code...' : 'This code is generated automatically from the school name and checked for uniqueness.'}</small>
                            </div>
                            <div className="field"><label>School Contact</label><input value={registerForm.school_contact} onChange={(e) => setRegisterForm({...registerForm, school_contact: e.target.value})} required /></div>
                            <div className="field"><label>Municipality</label><input value={registerForm.municipality} onChange={(e) => setRegisterForm({...registerForm, municipality: e.target.value})} required /></div>
                            <div className="field"><label>School Address</label><input value={registerForm.school_address} onChange={(e) => setRegisterForm({...registerForm, school_address: e.target.value})} required /></div>
                            <div className="field"><label>School Category</label><select value={registerForm.school_category} onChange={(e) => setRegisterForm({...registerForm, school_category: e.target.value})} required><option value="JHS">JHS</option><option value="SHS">SHS</option></select></div>
                            <div className="field"><label>Years Requested</label><select value={registerForm.years_requested} onChange={(e) => setRegisterForm({...registerForm, years_requested: e.target.value})}>{Array.from({length:100}, (_,i)=>i+1).map(v => <option key={v} value={v}>{v} Year{v>1?'s':''}</option>)}</select></div>
                            <div className="field"><label>Admin Full Name</label><input value={registerForm.admin_full_name} onChange={(e) => setRegisterForm({...registerForm, admin_full_name: e.target.value})} required /></div>
                            <div className="field"><label>Admin Email</label><input value={registerForm.admin_email} onChange={(e) => setRegisterForm({...registerForm, admin_email: e.target.value})} required /></div>
                            <div className="field"><label>Admin Phone</label><input value={registerForm.admin_phone} onChange={(e) => setRegisterForm({...registerForm, admin_phone: e.target.value})} required /></div>
                            <div className="field"><label>Initial Password</label><input type="password" value={registerForm.password} onChange={(e) => setRegisterForm({...registerForm, password: e.target.value})} required /></div>
                            <div className="field"><label>School Logo</label><input type="file" ref={logoRef} accept="image/*" /></div>
                          </div>
                        </div>
                        <button className="btn">Submit Registration</button>
                      </form>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GenericCrudPage({ title, description, columns, rows, formState, setFormState, onSave, onDelete, onEdit, loading, filters, children, extraActions, rowActions, fields }) {
      const renderedFields = fields || Object.keys(formState).map((key) => ({ key, label: key.replace(/_/g, " "), type: "text" }));
      return (
        <div className="grid">
          <div className="card">
            <h3 style={{marginTop:0}}>{title}</h3>
            <p className="subtle">{description}</p>
            {filters}
            <div className="form-grid-3">
              {renderedFields.map((field) => {
                const key = field.key;
                const label = field.label || key.replace(/_/g, ' ');
                const value = formState[key] ?? (field.type === 'multiselect' ? [] : '');
                const setValue = (next) => setFormState({ ...formState, [key]: next });
                return (
                  <div className="field" key={key}>
                    <label>{label}</label>
                    {field.type === 'select' ? (
                      <select value={value} onChange={(e) => setValue(e.target.value)} disabled={field.disabled} readOnly={field.readOnly}>
                        {(field.options || []).map((opt) => {
                          const option = typeof opt === 'string' ? { value: opt, label: opt } : opt;
                          return <option key={option.value} value={option.value}>{option.label}</option>;
                        })}
                      </select>
                    ) : field.type === 'date' ? (
                      <input type="date" value={value || ''} onChange={(e) => setValue(e.target.value)} disabled={field.disabled} readOnly={field.readOnly} />
                    ) : field.type === 'multiselect' ? (
                      <select multiple value={Array.isArray(value) ? value : []} onChange={(e) => setValue(Array.from(e.target.selectedOptions).map(o => o.value))} style={{minHeight:120}} disabled={field.disabled}>
                        {(field.options || []).map((opt) => {
                          const option = typeof opt === 'string' ? { value: opt, label: opt } : opt;
                          return <option key={option.value} value={option.value}>{option.label}</option>;
                        })}
                      </select>
                    ) : (
                      <input type={field.type || 'text'} value={value ?? ''} onChange={(e)=>setValue(e.target.value)} placeholder={field.placeholder || ''} disabled={field.disabled} readOnly={field.readOnly} />
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex', gap:10, marginTop:16, flexWrap:'wrap'}}>
              <button className="btn" onClick={onSave}>Save</button>
              {extraActions}
            </div>
            {children}
          </div>
          <div className="card">
            <div className="topbar" style={{marginBottom: 10}}>
              <div className="page-title"><h2 style={{fontSize:22, marginBottom:0}}>{title} List</h2></div>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr>{columns.map(c => <th key={c.key}>{c.label}</th>)}<th>Actions</th></tr></thead>
                <tbody>
                  {!loading && rows.length === 0 && <tr><td colSpan={columns.length + 1}><div className="empty">No records found</div></td></tr>}
                  {rows.map(row => (
                    <tr key={row.id || row.profile_id}>
                      {columns.map(c => <td key={c.key}>{c.render ? c.render(row[c.key], row) : row[c.key]}</td>)}
                      <td>
                        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                          <button className="btn secondary" onClick={() => onEdit(row)}>Edit</button>
                          <button className="btn danger" onClick={() => onDelete(row.id, row)}>Delete</button>
                          {rowActions ? rowActions(row) : null}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

              <p><strong>Totals:</strong> {gradeTotal}</p>

            <div>
              <h3>Student Fee Statement</h3>
              <p><strong>Student:</strong> {currentStudent?.full_name || 'N/A'}</p>

              <p><strong>Outstanding Balance:</strong> {renderFeeAmount('balance', feeDue - feePaid)}</p>

          }
          const ctx = chatAudioContextRef.current;
          if (ctx.state === 'suspended') {
            try { ctx.resume(); } catch {}
          }
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          oscillator.type = kind === 'received' ? 'triangle' : 'sine';
          oscillator.frequency.setValueAtTime(kind === 'received' ? 880 : 660, ctx.currentTime);

      useEffect(() => {
        loadSystemTheme();

        supabaseClient.auth.getSession().then(async ({ data }) => {
          if (data.session) {
            try {
              const { data: refreshedData } = await supabaseClient.auth.refreshSession();
              const effectiveSession = refreshedData?.session || data.session;
              if (effectiveSession?.user) {
                loadCore(effectiveSession.user, { preservePage: true });
                return;
              }
            } catch {}
            loadCore(data.session.user, { preservePage: true });
          } else {
            setSessionReady(true);
          }
        });

        const { data: sub } = supabaseClient.auth.onAuthStateChange((evt, session) => {
          if (!session) {
            setSelfPresenceState('offline');
            setProfile(null);
            setSchool(null);
            setWelcomeContext(null);
            setPageBackStack([]);
            setPageForwardStack([]);
            setSessionReady(true);
            return;
          }

          if (tabVisibilityRef.current) {
            if (evt === 'SIGNED_OUT' || !session) {
              setSelfPresenceState('offline');
            }
            return;
          }

          if (Date.now() < suppressAutoReloadUntilRef.current && (evt === 'SIGNED_IN' || evt === 'INITIAL_SESSION' || evt === 'TOKEN_REFRESHED' || evt === 'USER_UPDATED')) {
            return;
          }

          if (evt === 'SIGNED_IN' || evt === 'INITIAL_SESSION') {
            window.setTimeout(async () => {
              try { await setCurrentPresence(true); } catch {}
              setSelfPresenceState('online');
              loadCore(session.user);
            }, 0);
          }

          if (evt === 'TOKEN_REFRESHED') {
            window.setTimeout(() => {
              setSelfPresenceState('online');
            }, 0);
          }

          if (evt === 'USER_UPDATED') {
            window.setTimeout(() => {
              setSelfPresenceState('online');
            }, 0);
          }
        });

        const handleBeforeUnload = () => {
          try {
            if (page) setBrowserValue('sms_current_page', page);
            setBrowserValue('sms_last_activity_at', String(Date.now()));
          } catch {}
        };
        window.addEventListener('beforeunload', handleBeforeUnload);

        return () => {
          window.removeEventListener('beforeunload', handleBeforeUnload);
          sub.subscription.unsubscribe();
        };
      }, []);

      useEffect(() => {
        if (profile) {
          refreshAll();

          setWelcomeContext(null);
        }
      }, [profile?.id, role]);

      useEffect(() => {
        setBrowserValue('sms_current_page', page);

      useEffect(() => {
        if (!profile?.id) {
          previousPageRef.current = page;
          pageHistoryBootRef.current = false;
          return;
        }
        if (!pageHistoryBootRef.current) {
          pageHistoryBootRef.current = true;
          previousPageRef.current = page;
          return;
        }
        if (pageHistorySkipRef.current) {
          pageHistorySkipRef.current = false;
          previousPageRef.current = page;
          return;
        }
        const previousPage = previousPageRef.current;
        if (previousPage && previousPage !== page) {
          setPageBackStack((prev) => (prev[prev.length - 1] === previousPage ? prev : [...prev, previousPage].slice(-50)));
          setPageForwardStack([]);
        }
        previousPageRef.current = page;
      }, [page, profile?.id]);

      useEffect(() => {
        if (!profile?.id) return undefined;

        let closed = false;
        const readStoredActivity = () => {
          try {
            const raw = getBrowserValue('sms_last_activity_at');
            const parsed = Number(raw);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : null;
          } catch {
            return null;
          }
        };

        const registerActivity = () => markUserActivity(false);
        markUserActivity(true);

        const activityEvents = ['pointerdown', 'keydown', 'mousemove', 'scroll', 'touchstart'];
        activityEvents.forEach((eventName) => window.addEventListener(eventName, registerActivity, { passive: true }));

        const timer = window.setInterval(async () => {
          if (closed) return;
          if (tabVisibilityRef.current) return;
          const lastActivityAt = readStoredActivity() || lastActivityRef.current;
          if ((Date.now() - lastActivityAt) < IDLE_TIMEOUT_MS) return;
          closed = true;
          setNotice({ type: 'danger', text: 'Session expired after 10 minutes of inactivity. Please log in again.' });
          try {
            if (profile?.id) markPresenceLocally(profile.id, false, new Date().toISOString());
            setSelfPresenceState('offline');
            await signOut();
          } finally {
            setProfile(null);
            setSchool(null);
            setWelcomeContext(null);
            setPageBackStack([]);
            setPageForwardStack([]);
            removeBrowserValue('sms_current_page');
          }
        }, 15000);

        return () => {
          closed = true;
          activityEvents.forEach((eventName) => window.removeEventListener(eventName, registerActivity));
          window.clearInterval(timer);
        };
      }, [profile?.id]);

      useEffect(() => {
        const channel = supabaseClient.channel('system-theme-public-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'system_theme_settings' }, loadSystemTheme).subscribe();
        return () => {
          supabaseClient.removeChannel(channel);
        };
      }, []);


      useEffect(() => {
        if (!profile) return undefined;

        const handleProfilesRealtime = async (payload) => {
          if (tabVisibilityRef.current) return;
          if (Date.now() < suppressAutoReloadUntilRef.current) return;
          const nextRow = payload?.new || {};
          const prevRow = payload?.old || {};
          const keys = Array.from(new Set([...Object.keys(nextRow), ...Object.keys(prevRow)]));
          const presenceKeys = ['is_online', 'last_seen_at'];
          const hasNonPresenceChange = payload?.eventType !== 'UPDATE' || keys.some((key) => !presenceKeys.includes(key) && JSON.stringify(nextRow[key]) !== JSON.stringify(prevRow[key]));
          if (hasNonPresenceChange) {
            await refreshAll();
            return;
          }
          await (profile?.school_id ? profilesPresenceHook.fetchRows((q)=>q.eq('school_id', profile.school_id)) : profilesPresenceHook.fetchRows());
        };

        const guardedRefreshAll = async () => {
          if (tabVisibilityRef.current) return;
          if (Date.now() < suppressAutoReloadUntilRef.current) return;
          await refreshAll();
        };

        const channels = [
          supabaseClient.channel('profiles-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, handleProfilesRealtime).subscribe(),
          supabaseClient.channel('schools-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'schools' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('students-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'students' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('teachers-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'teachers' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('parents-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'parents' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('principals-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'principals' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('accounts-office-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'accounts_office_staff' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('parent-links-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'parent_student_links' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('classes-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'classes' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('subjects-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'subjects' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('subject-assignments-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'teacher_subject_assignments' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('attendance-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('grades-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'grades' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('fees-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'fee_payments' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('notifications-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('timetable-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'timetable' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('chat-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'chat_messages' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('chat-permissions-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'chat_permissions' }, guardedRefreshAll).subscribe(),
          supabaseClient.channel('chat-hides-ch').on('postgres_changes', { event: '*', schema: 'public', table: 'chat_message_hides' }, guardedRefreshAll).subscribe()
        ];
        return () => channels.forEach(ch => supabaseClient.removeChannel(ch));
      }, [profile?.id, role]);

      useEffect(() => {
        if (!profile?.school_id) return undefined;
        const pollPresence = async () => {
          await profilesPresenceHook.fetchRows((q)=>q.eq('school_id', profile.school_id));
        };
        pollPresence();
        const timer = window.setInterval(pollPresence, 5000);
        return () => window.clearInterval(timer);
      }, [profile?.school_id]);

      const withNotice = async (fn, successText) => {
        setNotice({ type: "", text: "" });
        const { error } = await fn();
        if (error) return setNotice({ type: "danger", text: error.message });
        setNotice({ type: "success", text: successText });
        await refreshAll();
      };

      const saveEntity = async (table, form, resetFn, extra = {}) => {
        const payload = { ...form, ...extra };
        if (!payload.id) delete payload.id;
        return withNotice(async () => {
          const query = payload.id ? supabaseClient.from(table).update(payload).eq('id', payload.id) : supabaseClient.from(table).insert(payload);
          const res = await query;
          if (res?.error) throw res.error;
          resetFn();
          await refreshAll();
          return res;
        }, `${table} saved successfully`);
      };

      const deleteEntity = async (table, id) => withNotice(async () => {
        const res = await supabaseClient.from(table).delete().eq('id', id);
        if (res?.error) throw res.error;
        await refreshAll();
        return res;
      }, `${table} deleted successfully`);


      const handleSchoolApproval = async (registrationId, action) => {
        if (!requireSuperAdminAction()) return;
        setNotice({ type: '', text: '' });

        if (action === 'approved') {
          const { error } = await supabaseClient.rpc('approve_school_registration', {
            p_registration_id: registrationId
          });
          if (error) {
            setNotice({ type: 'danger', text: error.message || 'Failed to approve registration' });
            return;
          }
          setNotice({ type: 'success', text: 'School registration approved successfully' });
          await refreshAll();
          return;
        }

        const { error } = await supabaseClient.rpc('process_school_registration', {
          reg_id: registrationId,
          decision: action
        });
        if (error) {
          setNotice({ type: 'danger', text: error.message || `Failed to mark registration ${action}` });
          return;
        }
        setNotice({ type: 'success', text: `Registration ${action}` });
        await refreshAll();
      };

      const handleProvisionSchoolAdmin = async (schoolId) => {
        if (!requireSuperAdminAction()) return;

        setNotice({ type: '', text: '' });

        const { data: sessionData } = await supabaseClient.auth.getSession();
        const token = sessionData?.session?.access_token;

        if (!token) {
          setNotice({ type: 'danger', text: 'No active session token found. Please log in again.' });
          return;
        }

        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/provision-school-admin`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              schoolId,
              loginUrl: window.location.origin + window.location.pathname
            })
          });

          const payload = await res.json().catch(() => ({}));

          if (!res.ok) {
            setNotice({
              type: 'danger',
              text: payload?.error || `Create Admin Login failed with status ${res.status}`
            });
            return;
          }

          const credentialsText = [
            `School: ${payload?.schoolName || ''}`,
            `Admin: ${payload?.adminName || ''}`,
            `Email: ${payload?.email || ''}`,
            `Temporary Password: ${payload?.temporaryPassword || ''}`,
            `Login URL: ${payload?.loginUrl || window.location.origin + window.location.pathname}`,
            payload?.issuedAt ? `Issued At: ${formatDate(payload.issuedAt)}` : '',
            '',
            'The school admin must log in with the temporary password and will be forced to change it on first login.'
          ].filter(Boolean).join('\n');

          await copyText(
            credentialsText,
            payload?.mode === 'reset'
              ? 'School admin credentials reset. Latest credentials copied to clipboard and saved for reference.'
              : 'School admin login created. Credentials copied to clipboard and saved for reference.'
          );

          if (payload?.referenceWarning) {
            setNotice({ type: 'warning', text: payload.referenceWarning });
          } else {
            setNotice({
              type: 'success',
              text: payload?.mode === 'reset'
                ? 'School admin credentials reset successfully.'
                : 'School admin login created successfully.'
            });
          }

          window.alert(credentialsText);
          await refreshAll();
        } catch (err) {
          setNotice({
            type: 'danger',
            text: err?.message || 'Failed to send a request to the Edge Function'
          });
        }
      };

        const confirmed = window.confirm(
          `Permanently delete ${schoolName || 'this registration'}? This will remove the registration record and, if already approved, the linked school data, profiles, and related records. This action cannot be undone.`

        setNotice({ type: '', text: '' });
        const { data: sessionData } = await supabaseClient.auth.getSession();
        const token = sessionData?.session?.access_token;

        if (!token) {
          setNotice({ type: 'danger', text: 'No active session token found. Please log in again.' });
          return;
        }

        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-school-registration`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ registrationId })
          });

          const payload = await res.json().catch(() => ({}));

          if (!res.ok) {
            setNotice({
              type: 'danger',
              text: payload?.error || `Delete failed with status ${res.status}`
            });
            return;
          }

          setNotice({
            type: 'success',
            text: payload?.message || `${schoolName || 'School record'} deleted permanently.`

        if (!ref) return `${row.full_name || 'User'}\nNo saved login credential reference.`;
        return [
          `School: ${ref.school_name || school?.name || ''}`,
          `Role: ${ref.role_name || row.role_name || ''}`,

      const handleProvisionManagedUser = async (row) => {
        if (!canSchoolAdminManageUsers) {
          setNotice({ type: 'danger', text: 'Only the school admin can create or reset managed user credentials.' });
          return;
        }

        const profileId = row.profile_id || row.id;
        if (!profileId) {
          setNotice({ type: 'danger', text: 'No linked profile was found for this record.' });
          return;
        }
        if (!isUuid(profileId)) {
          setNotice({ type: 'danger', text: 'This parent entry is not linked to a valid profile account yet. Save the parent properly in the Parents section first, then generate the login from User Accounts & Credentials.' });
          return;
        }

        setNotice({ type: '', text: '' });

        const effectiveRow = userForm.profile_id === profileId
          ? {
              ...row,
              username: userForm.username || row.username || '',
              email: userForm.email || row.email || '',
              account_status: normalizeAccountStatus(userForm.account_status || row.account_status || row.status || 'active'),
              force_password_change: normalizeBoolean(userForm.force_password_change ?? row.force_password_change ?? true)
            }
          : {
              ...row,
              account_status: normalizeAccountStatus(row.account_status || row.status || 'active'),
              force_password_change: normalizeBoolean(row.force_password_change ?? true)
            };

        const usernameToSave = effectiveRow.username || generateManagedUsername(effectiveRow);
        const { error: syncProfileError } = await supabaseClient
          .from('profiles')
          .update({
            username: usernameToSave || null,
            force_password_change: normalizeBoolean(effectiveRow.force_password_change ?? true)
          })
          .eq('id', profileId);

      const handleBulkStudentImport = (file) => {
        if (!file) return;
        setImportStatus('Parsing CSV...');
        window.Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: async (result) => {
            const rows = result.data.map(r => ({
              full_name: r.full_name,
              student_no: r.student_no,
              gender: r.gender,
              date_of_birth: r.date_of_birth,
              guardian_contact: r.guardian_contact,
              address: r.address,
              class_id: r.class_id
            }));
            setImportStatus(`Uploading ${rows.length} students...`);
            const chunkSize = 500;
            for (let i = 0; i < rows.length; i += chunkSize) {
              const chunk = rows.slice(i, i + chunkSize);
              const { error } = await supabaseClient.from('students').insert(chunk);
              if (error) {
                setImportStatus(`Import failed at row ${i + 1}: ${error.message}`);
                return;
              }
              setImportStatus(`Imported ${Math.min(i + chunk.length, rows.length)} of ${rows.length}`);
            }
            setImportStatus('Import completed successfully');
            refreshAll();
          },
          error: (error) => setImportStatus(error.message)
        });
      };

          if (message.chat_type !== 'student_student') return false;
          const classId = String(message.class_id || '').trim();
          const classLabel = String(message.class_name || classNameMap[classId] || '').trim();
          if (!isJhsClassLabel(classLabel)) return false;
          if (selectedClassId && classId !== selectedClassId) return false;
          if (allowedClassIds.size && classId && !allowedClassIds.has(classId)) return false;
          if (!searchText) return true;
          return [message.sender_name, message.recipient_name, message.message_text, message.class_name].some((value) => String(value || '').toLowerCase().includes(searchText));
        }).sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());
      }, [canCurrentUserMonitorStudentChat, visibleChatMessages, chatMonitorClassId, chatMonitorSearch, jhsChatMonitorClassOptions, classNameMap]);

      const monitoredStudentParticipants = useMemo(() => {
        const ids = new Map();

          [message.sender_profile_id, message.recipient_profile_id].forEach((profileId) => {

      const handleHideChatMessageForCurrentUser = async (message) => {

      const handleToggleStudentChatPermission = async (studentProfileId, nextAllowed) => {

        const payload = {
