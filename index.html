      const handleSendSystemChatMessage = async (options = {}) => {
        const recipientId = String(chatForm.recipient_profile_id || '').trim();
        const messageText = String(options.message_text ?? chatForm.message_text ?? '').trim();
        const messageKind = String(options.message_kind || 'text').trim().toLowerCase();
        const audioUrl = options.audio_url || null;
        const audioFilePath = options.audio_file_path || null;
        const audioDurationSeconds = options.audio_duration_seconds || null;
        if (!recipientId) {
          setNotice({ type: 'danger', text: 'Select who you want to chat with first.' });
          return;
        }
        if (messageKind === 'text' && !messageText) {
          setNotice({ type: 'danger', text: 'Enter a message before sending.' });
          return;
        }
        if (messageKind === 'audio' && !audioUrl) {
          setNotice({ type: 'danger', text: 'No audio recording was attached to this message.' });
          return;
        }
        const recipient = chatContactOptions.find((entry) => String(entry.profile_id || '').trim() === recipientId) || chatDirectoryMap.get(recipientId) || null;
        if (!recipient) {
          setNotice({ type: 'danger', text: 'The selected chat contact is no longer available.' });
          return;
        }

        let chatType = deriveChatTypeFromRoles(role, recipient.role_name);
        let sharedClassId = null;

        if (role === ROLE.STUDENT && recipient.role_name === 'student') {
          if (!currentStudentClassId || !currentStudentIsJhs) {
            setNotice({ type: 'danger', text: 'Student to student chat is limited to JHS students in the same class.' });
            return;
          }
          const recipientStudent = studentRecordsRows.find((row) => String(row.profile_id || '').trim() === recipientId) || null;
          const recipientClassId = String(recipientStudent?.class_id || '').trim();
          const senderPermission = chatPermissionByStudentProfileId.get(String(profile.id || '').trim());
          const recipientPermission = chatPermissionByStudentProfileId.get(recipientId);
          if ((senderPermission && senderPermission.is_allowed === false) || (recipientPermission && recipientPermission.is_allowed === false)) {
            setNotice({ type: 'danger', text: 'A school admin has currently disallowed one of the selected students from student chat.' });
            return;
          }
          if (!recipientStudent || recipientClassId !== currentStudentClassId) {
            setNotice({ type: 'danger', text: 'Student to student chat is allowed only for students in the same JHS class.' });
            return;
          }
          chatType = 'student_student';
          sharedClassId = currentStudentClassId;
        }

        if (role === ROLE.STUDENT && recipient.role_name === 'teacher') {
          const teacherClassIds = teacherProfileToClassIds.get(recipientId) || new Set();
          if (!currentStudentClassId || !teacherClassIds.has(currentStudentClassId)) {
            setNotice({ type: 'danger', text: 'You can chat only with teachers assigned to your class.' });
            return;
          }
          chatType = 'student_teacher';
          sharedClassId = currentStudentClassId;
        }

        if (role === ROLE.PARENT && recipient.role_name === 'teacher') {
          const linkedClassIds = new Set(Array.from(parentProfileToLinkedClassIds.get(String(profile.id || '').trim()) || []));
          const teacherClassIds = teacherProfileToClassIds.get(recipientId) || new Set();
          sharedClassId = Array.from(teacherClassIds).find((classId) => linkedClassIds.has(classId)) || null;
          if (!sharedClassId) {
            setNotice({ type: 'danger', text: 'You can chat only with teachers connected to your linked child or children.' });
            return;
          }
          chatType = 'parent_teacher';
        }

        if (role === ROLE.PRINCIPAL && recipient.role_name === 'teacher') {
          chatType = 'principal_teacher';
        }

        if (role === ROLE.TEACHER && recipient.role_name === 'student') {
          const studentRow = studentRecordsRows.find((row) => String(row.profile_id || '').trim() === recipientId) || null;
          const recipientClassId = String(studentRow?.class_id || '').trim();
          if (!recipientClassId || !teacherAccessibleClassIds.includes(recipientClassId)) {
            setNotice({ type: 'danger', text: 'You can reply only to students in your school class list.' });
            return;
          }
          chatType = 'student_teacher';
          sharedClassId = recipientClassId;
        }

        if (role === ROLE.TEACHER && recipient.role_name === 'parent') {
          const linkedClassIds = new Set(Array.from(parentProfileToLinkedClassIds.get(recipientId) || []));
          sharedClassId = teacherAccessibleClassIds.find((classId) => linkedClassIds.has(classId)) || null;
          if (!sharedClassId) {
            setNotice({ type: 'danger', text: 'You can chat only with parents linked to students in your school class list.' });
            return;
          }
          chatType = 'parent_teacher';
        }

        if (role === ROLE.TEACHER && recipient.role_name === 'principal') {
          chatType = 'principal_teacher';
        }

        setNotice({ type: '', text: '' });
        const payload = {
          sender_profile_id: profile.id,
          recipient_profile_id: recipientId,
          message_text: messageText,
          school_id: profile.school_id || null,
          class_id: sharedClassId || null,
          chat_type: chatType,
          message_kind: messageKind,
          audio_url: audioUrl,
          audio_file_path: audioFilePath,
          audio_duration_seconds: audioDurationSeconds
        };
        const { error } = await supabaseClient.from('chat_messages').insert(payload);
        if (error) {
          setNotice({ type: 'danger', text: error.message });
          return;
        }
        setChatForm((current) => ({ ...current, message_text: '' }));
        setShowEmojiPanel(false);
        setNotice({ type: 'success', text: messageKind === 'audio' ? 'Audio message sent.' : 'Message sent.' });
        playChatSound('sent');
        await refreshAll();
        markChatSeen();
      };

      const stopMediaRecordingVisuals = () => {
        setIsRecordingAudio(false);
        setRecordingDurationSec(0);
        try { mediaRecordingTimerRef.current && window.clearInterval(mediaRecordingTimerRef.current); } catch {}
        mediaRecordingTimerRef.current = null;
      };

      const handleStartChatAudioRecording = async () => {
        if (!navigator?.mediaDevices?.getUserMedia || typeof window.MediaRecorder === 'undefined') {
          setAudioRecorderError('Audio recording is not supported on this browser or device.');
          return;
        }
        if (!chatForm.recipient_profile_id) {
          setNotice({ type: 'danger', text: 'Choose a contact before recording audio.' });
          return;
        }
        setAudioRecorderError('');
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const recorder = new MediaRecorder(stream);
          mediaRecorderStreamRef.current = stream;
          mediaRecorderChunksRef.current = [];
          recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) mediaRecorderChunksRef.current.push(event.data);
          };
          recorder.onerror = () => {
            setAudioRecorderError('Audio recording failed. Please try again.');
            stopMediaRecordingVisuals();
          };
          recorder.start();
          mediaRecorderRef.current = recorder;
          setIsRecordingAudio(true);
          setRecordingDurationSec(0);
          mediaRecordingTimerRef.current = window.setInterval(() => {
            setRecordingDurationSec((current) => current + 1);
          }, 1000);
        } catch (error) {
          setAudioRecorderError(error?.message || 'Unable to access your microphone.');
          stopMediaRecordingVisuals();
        }
      };

      const handleStopChatAudioRecording = async (shouldSend = true) => {
        const recorder = mediaRecorderRef.current;
        if (!recorder) return;
        const durationAtStop = recordingDurationSec;
        recorder.onstop = async () => {
          try {
            const chunks = Array.isArray(mediaRecorderChunksRef.current) ? mediaRecorderChunksRef.current : [];
            const stream = mediaRecorderStreamRef.current;
            if (stream?.getTracks) stream.getTracks().forEach((track) => track.stop());
            mediaRecorderStreamRef.current = null;
            mediaRecorderRef.current = null;
            if (!shouldSend || chunks.length === 0) {
              mediaRecorderChunksRef.current = [];
              stopMediaRecordingVisuals();
              return;
            }
            const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
            mediaRecorderChunksRef.current = [];
            const extension = (blob.type || '').includes('ogg') ? 'ogg' : ((blob.type || '').includes('mp4') ? 'm4a' : 'webm');
            const filePath = `${String(profile?.school_id || 'global')}/${String(profile?.id || 'user')}/${Date.now()}.${extension}`;
            const { error: uploadError } = await supabaseClient.storage.from(CHAT_AUDIO_BUCKET).upload(filePath, blob, {
              contentType: blob.type || 'audio/webm',
              upsert: false
            });
            if (uploadError) {
              setNotice({ type: 'danger', text: uploadError.message });
              stopMediaRecordingVisuals();
              return;
            }
            const { data: publicUrlData } = supabaseClient.storage.from(CHAT_AUDIO_BUCKET).getPublicUrl(filePath);
            const audioUrlValue = publicUrlData?.publicUrl || null;
            await handleSendSystemChatMessage({
              message_kind: 'audio',
              message_text: '',
              audio_url: audioUrlValue,
              audio_file_path: filePath,
              audio_duration_seconds: durationAtStop
            });
          } catch (error) {
            setNotice({ type: 'danger', text: error?.message || 'Failed to send the audio message.' });
          } finally {
            stopMediaRecordingVisuals();
          }
        };
        try {
          recorder.stop();
        } catch (error) {
          setNotice({ type: 'danger', text: error?.message || 'Failed to stop audio recording.' });
          stopMediaRecordingVisuals();
        }
      };

      const quickReplyToChatStudent = (targetProfileId) => {
        if (![ROLE.TEACHER, ROLE.ADMIN].includes(role) || !targetProfileId) return;
        if (role === ROLE.TEACHER) {
          setChatForm((current) => ({ ...current, recipient_profile_id: String(targetProfileId || '').trim() }));

      };

        if (!recipientId) return;
        setChatForm((current) => ({ ...current, recipient_profile_id: recipientId, message_text: '' }));
        setPage(targetPage);
        setNotice({ type: '', text: '' });
      };

      const attendanceRowsToday = useMemo(() => (
        (attendanceHook.rows || []).filter((row) => row.attendance_date === todayISO())
      ), [attendanceHook.rows]);

      const principalTeacherPresenceRows = useMemo(() => {
        const teacherRowMap = Object.fromEntries(mergedTeachersRows.map((row) => [row.id, row]));
        const uniqueAssignments = [];
        const seen = new Set();

        (subjectAssignmentsHook.rows || []).forEach((assignment) => {
          const teacherRow = teacherRowMap[assignment.teacher_id] || null;
          const teacherProfileId = assignment.teacher_profile_id || teacherRow?.profile_id || null;
          const key = [
            teacherProfileId || assignment.teacher_id || assignment.teacher_name || 'teacher',
            assignment.class_id || assignment.class_name || 'class',
            assignment.subject_name || 'subject'
          ].join('::');
          if (seen.has(key)) return;
          seen.add(key);

          const matchingAttendance = attendanceRowsToday.find((row) => {
            const sameTeacher = teacherProfileId
              ? row.marked_by_profile_id === teacherProfileId
              : (row.marked_by_name || '') === (assignment.teacher_name || '');
            const sameClass = assignment.class_id ? row.class_id === assignment.class_id : (row.class_name || '') === (assignment.class_name || '');
            const sameSubject = assignment.subject_name
              ? ((row.subject_name || '') === assignment.subject_name || !(row.subject_name || '').trim())
              : true;
            return sameTeacher && sameClass && sameSubject;
          });

          uniqueAssignments.push({
            id: assignment.id || key,
            teacher_name: assignment.teacher_name || teacherRow?.full_name || 'Teacher',
            class_name: assignment.class_name || classNameMap[assignment.class_id] || 'Class',
            subject_name: assignment.subject_name || 'Subject',
            status: matchingAttendance ? 'Present' : 'Absent',
            marked_at: matchingAttendance?.updated_at || matchingAttendance?.created_at || null,
            recorded_by_name: matchingAttendance?.marked_by_name || assignment.teacher_name || teacherRow?.full_name || 'Teacher'
          });
        });

        return uniqueAssignments.sort((a, b) => {
          if (a.status !== b.status) return a.status === 'Absent' ? -1 : 1;
          return String(a.teacher_name).localeCompare(String(b.teacher_name));
        });
      }, [subjectAssignmentsHook.rows, attendanceRowsToday, mergedTeachersRows, classNameMap]);

      const principalTeacherPresenceSummary = useMemo(() => ({
        present: principalTeacherPresenceRows.filter((row) => row.status === 'Present').length,
        absent: principalTeacherPresenceRows.filter((row) => row.status === 'Absent').length
      }), [principalTeacherPresenceRows]);

      const principalSubjectNames = useMemo(() => {
        const values = new Set();
        (mergedTeachersRows || []).forEach((row) => {
          const value = String(row.subject_specialty || '').trim();
          if (value) values.add(value);
        });
        (subjectAssignmentsHook.rows || []).forEach((row) => {
          const value = String(row.subject_name || '').trim();
          if (value) values.add(value);
        });
        return Array.from(values).sort((a, b) => a.localeCompare(b));
      }, [mergedTeachersRows, subjectAssignmentsHook.rows]);

      const principalAttendanceOverview = useMemo(() => {
        const rows = attendanceHook.rows || [];
        return {
          total: rows.length,
          present: rows.filter((row) => String(row.status || '').toLowerCase() === 'present').length,
          absent: rows.filter((row) => String(row.status || '').toLowerCase() === 'absent').length,
          late: rows.filter((row) => String(row.status || '').toLowerCase() === 'late').length
        };
      }, [attendanceHook.rows]);

      const principalPerformanceOverview = useMemo(() => {
        const rows = gradesHook.rows || [];
        const averages = rows
          .map((row) => Number(row.average_score || row.total_score || 0))
          .filter((value) => Number.isFinite(value));
        const overallAverage = averages.length ? (averages.reduce((sum, value) => sum + value, 0) / averages.length) : 0;
        return {
          gradeEntries: rows.length,
          overallAverage: overallAverage.toFixed(1),
          uniqueStudents: new Set(rows.map((row) => row.student_id || row.student_name).filter(Boolean)).size
        };
      }, [gradesHook.rows]);

      const principalClassPerformanceRows = useMemo(() => {
        const grouped = new Map();
        (gradesHook.rows || []).forEach((row) => {
          const key = String(row.class_name || row.class_id || 'Unassigned');
          const current = grouped.get(key) || { class_name: key, count: 0, total: 0 };
          current.count += 1;
          current.total += Number(row.average_score || row.total_score || 0);
          grouped.set(key, current);
        });
        return Array.from(grouped.values())
          .map((row) => ({
            ...row,
            average_score: row.count ? (row.total / row.count).toFixed(1) : '0.0'
          }))
          .sort((a, b) => String(a.class_name).localeCompare(String(b.class_name)));
      }, [gradesHook.rows]);

      const principalTeacherAssignmentSummaryRows = useMemo(() => (
        (mergedTeachersRows || []).map((row) => ({
          id: row.id || row.profile_id || row.full_name,
          full_name: row.full_name || '-',
          assigned_class: teacherAssignedClassDisplay(row),
          primary_subject: row.subject_specialty || '-',
          qualification: row.qualification || '-',
          training_status: row.trained_status || '-'
        }))
      ), [mergedTeachersRows, teacherAssignedClassDisplay]);

      const recentAcademicUpdates = useMemo(() => {
        const gradeUpdates = (gradesHook.rows || []).map((row) => ({
          id: `grade-${row.id}`,
          update_type: 'Grade Update',
          subject_name: row.subject_name || '-',
          student_name: row.student_name || '-',
          teacher_name: row.teacher_name || row.marked_by_name || '-',

          term_name: row.term_name || '-',

        }));

        }));

          .slice(0, 12);

      const principalStudentClassLookup = useMemo(() => {
        const map = new Map();

          if (!studentKey) return;

      const principalClassFilterOptions = useMemo(() => (

              .map((student) => String(student.student_main_class_name || classNameMap[student.class_id] || student.class_name || '').trim())
              .filter(Boolean)
          ))
            .sort((a, b) => a.localeCompare(b))

        )
      ), [studentRecordsRows, classNameMap]);

          const mainClassValue = String(student.student_main_class_name || classNameMap[student.class_id] || student.class_name || '').trim();

        const seen = new Map();
        filteredStudents.forEach((student) => {

          if (!key || seen.has(key)) return;
          const mainClassValue = String(student.student_main_class_name || classNameMap[student.class_id] || student.class_name || '').trim();
          seen.set(key, {

        if (!studentRow?.id || !school?.id) {
          return { publicUrl: null, error: { message: 'Student record was not found for picture upload.' } };
        }
        if (!file) return { publicUrl: studentRow.student_photo_url || null, error: null };
        if (!String(file.type || '').startsWith('image/')) {
          return { publicUrl: null, error: { message: 'Only image files are allowed for student pictures.' } };
        }
        const ext = String(file.name || '').includes('.') ? String(file.name).split('.').pop().toLowerCase() : 'png';
        const safeTail = String(studentRow.student_no || studentRow.id || Date.now()).replace(/[^a-z0-9_-]+/gi, '-').toLowerCase();
        const path = `${school.id}/students/${safeTail}-${Date.now()}.${ext}`;
        const { error: uploadError } = await uploadFile(path, file);
        if (uploadError) return { publicUrl: null, error: uploadError };
        const { data: publicData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        const publicUrl = publicData?.publicUrl ? `${publicData.publicUrl}?t=${Date.now()}` : null;

        else query = supabaseClient.from('teachers').select('*').eq('school_id', school?.id || null).eq('full_name', form.full_name).order('updated_at', { ascending: false }).limit(1);
        const { data, error } = await query.maybeSingle();

      const syncStudentParentData = async (form) => {
        if (!school?.id) return null;
        const studentRow = await getLatestStudentRow(form);
        if (!studentRow?.id) return null;

        const { error: studentUpdateError } = await supabaseClient
          .from('students')
          .update({
            parent_full_name: form.parent_full_name || null,
            parent_contact: form.parent_contact || null,
            relationship_to_student: form.relationship_to_student || null
          })
          .eq('id', studentRow.id);

        if (studentUpdateError) {
          return studentUpdateError;
        }

        const syncStudentPictureOnly = async () => {
          const studentPhotoFile = studentPhotoRef.current?.files?.[0] || null;
          if (!studentPhotoFile) return null;
          const latestStudentRow = await getLatestStudentRow({
            id: studentRow.id,
            profile_id: studentRow.profile_id,
            student_no: studentRow.student_no,
            full_name: studentRow.full_name
          }) || studentRow;
          const { publicUrl, error: studentPhotoError } = await uploadStudentPhotoForRecord(latestStudentRow, studentPhotoFile);
          if (studentPhotoError) return studentPhotoError;
          const { error: photoUpdateError } = await supabaseClient
            .from('students')
            .update({ student_photo_url: publicUrl, updated_at: new Date().toISOString() })
            .eq('id', latestStudentRow.id);
          if (photoUpdateError) return photoUpdateError;
          const linkedProfileId = String(latestStudentRow.profile_id || form.profile_id || '').trim();
          if (linkedProfileId) {
            await supabaseClient
              .from('profiles')
              .update({ profile_photo_url: publicUrl })
              .eq('id', linkedProfileId);
          }
          if (studentPhotoRef.current) studentPhotoRef.current.value = '';
          return null;

        if (!form.parent_full_name && !form.parent_contact) {
          await supabaseClient.from('parent_student_links').delete().eq('student_id', studentRow.id);
          return await syncStudentPictureOnly();
        }

        let parentRecord = null;
        const { data: existingParent } = await supabaseClient
          .from('parents')
          .select('*')
          .eq('school_id', school.id)
          .eq('full_name', form.parent_full_name || '')
          .eq('phone', form.parent_contact || '')
          .maybeSingle();

        if (existingParent?.id) {
          parentRecord = existingParent;
          await supabaseClient
            .from('parents')
            .update({
              full_name: form.parent_full_name || existingParent.full_name,
              phone: form.parent_contact || existingParent.phone,
              relationship_to_student: form.relationship_to_student || existingParent.relationship_to_student || 'Parent',
              status: existingParent.status || 'active'
            })
            .eq('id', existingParent.id);
        } else {
          const { data: insertedParent, error: parentInsertError } = await supabaseClient
            .from('parents')
            .insert({
              school_id: school.id,
              profile_id: null,
              full_name: form.parent_full_name || null,
              phone: form.parent_contact || null,
              email: null,
              relationship_to_student: form.relationship_to_student || 'Parent',
              status: 'active'
            })
            .select('*')
            .single();
          if (parentInsertError) {
            return parentInsertError;
          }
          parentRecord = insertedParent;
        }

        if (parentRecord?.id) {
          await supabaseClient.from('parent_student_links').delete().eq('student_id', studentRow.id).neq('parent_id', parentRecord.id);
          const { data: linkExists } = await supabaseClient
            .from('parent_student_links')
            .select('parent_id, student_id')
            .eq('parent_id', parentRecord.id)
            .eq('student_id', studentRow.id)
            .maybeSingle();
          if (!linkExists) {

          qualification: row.qualification || '',
          assigned_subjects: row.assigned_subjects || [],
          assigned_class_ids: row.assigned_class_ids || [],
          relationship_to_student: row.relationship_to_student || '',
          parent_full_name: row.parent_full_name || '',

          emis_code: row.emis_code || '',
          ghana_card: row.ghana_card || '',
          trained_status: row.trained_status || 'Trained'
        });
        setPage('users');
      };

      const roleScopedManagedUsers = useMemo(() => {
        if (userForm.role_name === 'parent') {
          return [...realParentRows]
            .filter((row) => isUuid(row.profile_id))
            .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')));
        }

        if (userForm.role_name === 'accounts_office') {
          return [...(accountsHook.rows || [])]
            .map((row) => ({
              ...row,
              role_name: 'accounts_office',
              profile_id: row.profile_id || row.id || '',
              class_name: row.class_name || ''
            }))
            .filter((row) => String(row.profile_id || '').trim())
            .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')));
        }

        return [...managedUsersRows]
          .filter((row) => row.role_name === userForm.role_name)
          .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')));
      }, [managedUsersRows, realParentRows, accountsHook.rows, userForm.role_name]);

      const selectedManagedUser = useMemo(() => {
        return roleScopedManagedUsers.find((row) => row.profile_id === userForm.profile_id)
          || managedUsersRows.find((row) => row.profile_id === userForm.profile_id)
          || null;
      }, [roleScopedManagedUsers, managedUsersRows, userForm.profile_id]);

      const schoolSubjectRows = useMemo(() => {
        return [...(subjectsHook.rows || [])].sort((a, b) => String(a.subject_name || '').localeCompare(String(b.subject_name || '')));
      }, [subjectsHook.rows]);

      const schoolSubjectOptions = useMemo(() => ([
        { value: '', label: 'Select Subject' },
        ...schoolSubjectRows.map((row) => ({ value: row.id, label: row.subject_name }))
      ]), [schoolSubjectRows]);

      const teacherGradeSubjectOptions = useMemo(() => {
        return [{ value: '', label: 'Select Subject' }].concat(
          schoolSubjectRows.map((row) => ({ value: row.id, label: row.subject_name }))
        );
      }, [schoolSubjectRows]);

      const timetableClassOptions = useMemo(() => ([
        { value: '', label: 'Select Class' },
        ...orderedClassRows.map((row) => ({ value: row.id, label: buildClassDisplay(row) || row.class_name || row.name || '-' }))
      ]), [orderedClassRows]);

      const timetableTeacherRows = useMemo(() => (
        [...(mergedTeachersRows || [])]
          .filter((row) => String(row.profile_id || row.id || '').trim())
          .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')))
      ), [mergedTeachersRows]);

      const timetableTeacherOptions = useMemo(() => ([
        { value: '', label: 'Select Teacher' },
        ...timetableTeacherRows.map((row) => ({ value: String(row.profile_id || row.id || ''), label: row.full_name || row.username || row.email || 'Teacher' }))
      ]), [timetableTeacherRows]);

      const schoolTimetableRows = useMemo(() => (
        [...(timetableHook.rows || [])].sort((a, b) => {
          const dayRank = timetableDayOptions.indexOf(String(a.day_of_week || ''));
          const compareDay = (dayRank === -1 ? 999 : dayRank) - ((timetableDayOptions.indexOf(String(b.day_of_week || '')) === -1 ? 999 : timetableDayOptions.indexOf(String(b.day_of_week || ''))));
          if (compareDay !== 0) return compareDay;
          return String(a.start_time || '').localeCompare(String(b.start_time || ''));
        })
      ), [timetableHook.rows]);

      const teacherGradeRows = useMemo(() => {
        if (role !== ROLE.TEACHER) return gradesHook.rows || [];
        return (gradesHook.rows || []).filter((row) => String(row.teacher_profile_id || '') === String(profile?.id || ''));
      }, [gradesHook.rows, role, profile?.id]);


      const teacherGradeFilterClassOptions = useMemo(() => {
        const options = [{ value: '', label: 'All Classes' }];
        orderedClassRows.forEach((row) => {
          const classId = String(row?.id || '').trim();
          const label = String(buildClassDisplay(row) || classNameMap[classId] || row?.class_name || row?.name || '').trim();
          if (!classId || !label) return;
          options.push({ value: classId, label });
        });
        return options;
      }, [orderedClassRows, classNameMap]);

      const teacherGradeEntryClassOptions = useMemo(() => {
        const options = [{ value: '', label: 'Select Class' }];
        teacherGradeFilterClassOptions
          .filter((option) => option.value)
          .forEach((option) => options.push({ value: option.value, label: option.label }));
        return options;
      }, [teacherGradeFilterClassOptions]);

      const teacherGradeStudentOptions = useMemo(() => {
        return (teacherStudentRecordsRows || [])
          .filter((student) => {
            if (!gradeForm.filter_class_name) return true;
            return String(student.class_id || '').trim() === String(gradeForm.filter_class_name || '').trim();
          })
          .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')));
      }, [teacherStudentRecordsRows, gradeForm.filter_class_name]);

      const teacherAcademicYearOptions = useMemo(() => (
        getAcademicYearOptions(
          Array.from(new Set((teacherGradeRows || []).map((row) => String(row.academic_year || '').trim()).filter(Boolean)))
        )
      ), [teacherGradeRows]);

      const teacherDisplayGradeRows = useMemo(() => {
        const filteredRows = (teacherGradeRows || []).filter((row) => {
          const rowClassId = String(row.class_id || '').trim();
          const resolvedStudentClassId = String((studentRecordsRows.find((student) => String(student.id || '') === String(row.student_id || '')) || {}).class_id || '').trim();
          const effectiveClassId = rowClassId || resolvedStudentClassId;
          if (gradeForm.filter_class_name && effectiveClassId !== String(gradeForm.filter_class_name || '').trim()) return false;
          if (gradeForm.term_name && String(row.term_name || '') !== gradeForm.term_name) return false;
          if (gradeForm.academic_year && String(row.academic_year || '') !== gradeForm.academic_year) return false;
          return true;
        });
        return buildDisplayGradeRows(filteredRows, principalStudentClassLookup, currentSchoolCategory);
      }, [teacherGradeRows, gradeForm.filter_class_name, gradeForm.term_name, gradeForm.academic_year, principalStudentClassLookup, studentRecordsRows, currentSchoolCategory]);

      const principalDisplayPerformanceRows = useMemo(() => (
        buildDisplayGradeRows(principalPerformanceRows, principalStudentClassLookup, currentSchoolCategory)
      ), [principalPerformanceRows, principalStudentClassLookup, currentSchoolCategory]);

      const resetTeacherGradeForm = () => {
        setGradeForm({ id: '', student_id: '', class_id: '', subject_id: '', term_name: 'Term 1', academic_year: getAcademicYearLabel(), filter_class_name: '', mid_term_a_score: '', end_of_term_raw_score: '' });
        setShowGradeEditor(false);
      };

      const openTeacherGradeEditor = (row = null) => {
        if (!row) {
          setGradeForm((prev) => ({ ...prev, id: '', student_id: '', class_id: prev.filter_class_name || '', subject_id: '', term_name: prev.term_name || 'Term 1', academic_year: prev.academic_year || getAcademicYearLabel(), mid_term_a_score: '', end_of_term_raw_score: '' }));
          setShowGradeEditor(true);
          return;
        }
        const linkedStudent = mergedStudentsRows.find((student) => String(student.id || '') === String(row.student_id || '')) || null;
        const classValue = String(row.class_id || linkedStudent?.class_id || '').trim();
        setGradeForm((prev) => ({
          ...prev,
          id: row.id || '',
          filter_class_name: classValue,
          student_id: row.student_id || '',
          class_id: classValue,
          subject_id: row.subject_id || '',
          term_name: row.term_name || 'Term 1',
          academic_year: row.academic_year || getAcademicYearLabel(),
          mid_term_a_score: String(clampScore(row.assignment_score, 0, 50)),
          end_of_term_raw_score: String(clampScore(Number(row.exam_score || 0) * 2, 0, 100))
        }));
        setShowGradeEditor(true);
      };

      const saveTeacherAttendance = async () => {
        const selectedClassId = String(attendanceForm.class_id || '').trim();
        const selectedStudent = teacherAttendanceStudents.find((student) => String(student.id || '').trim() === String(attendanceForm.student_id || '').trim()) || null;
        if (!selectedClassId) {
          setNotice({ type: 'danger', text: 'Please select a main class before saving attendance.' });
          return;
        }
        if (!selectedStudent) {
          setNotice({ type: 'danger', text: 'Please select a student from the selected class.' });
          return;
        }
        const payload = {
          id: attendanceForm.id || undefined,
          school_id: school?.id || profile?.school_id || null,
          student_id: attendanceForm.student_id,
          class_id: selectedClassId,
          attendance_date: attendanceForm.attendance_date,
          status: attendanceForm.status,
          remarks: attendanceForm.remarks || null,
          marked_by_profile_id: profile.id
        };
        try {
          setNotice({ type: '', text: '' });
          const query = payload.id
            ? supabaseClient.from('attendance').update(payload).eq('id', payload.id)
            : supabaseClient.from('attendance').insert(payload);
          const res = await query;
          if (res?.error) {
            setNotice({ type: 'danger', text: res.error.message || 'Failed to save attendance.' });
            return;
          }
          setAttendanceForm({ id:'', student_id:'', class_id:'', attendance_date: todayISO(), status: 'Present', remarks: '' });
          await refreshAll();
          setNotice({ type: 'success', text: 'Attendance saved successfully.' });
        } catch (error) {
          setNotice({ type: 'danger', text: error?.message || 'Failed to save attendance.' });
        }
      };

      const saveTeacherGrade = async () => {
        const selectedStudent = mergedStudentsRows.find((student) => String(student.id || '') === String(gradeForm.student_id || '')) || null;
        const resolvedClassId = String(gradeForm.filter_class_name || gradeForm.class_id || selectedStudent?.class_id || '').trim();
        if (!resolvedClassId) {
          setNotice({ type: 'danger', text: 'Please select a class before saving the grade.' });
          return;
        }
        if (!gradeForm.student_id || !gradeForm.subject_id) {
          setNotice({ type: 'danger', text: 'Please select both the student and subject before saving the grade.' });
          return;
        }
        if (selectedStudent && String(selectedStudent.class_id || '').trim() !== resolvedClassId) {
          setNotice({ type: 'danger', text: 'The selected student does not belong to the selected class.' });
          return;
        }
        const subjectAllowed = teacherGradeSubjectOptions.some((option) => String(option.value || '').trim() === String(gradeForm.subject_id || '').trim());
        if (!subjectAllowed) {
          setNotice({ type: 'danger', text: 'Please select a subject assigned to this class.' });
          return;
        }
        const midTermA = clampScore(gradeForm.mid_term_a_score, 0, 50);
        const endTermRaw = clampScore(gradeForm.end_of_term_raw_score, 0, 100);
        const endTermB = Number((endTermRaw / 2).toFixed(2));
        const basePayload = {
          id: gradeForm.id || undefined,
          school_id: school?.id || profile?.school_id || null,
          student_id: gradeForm.student_id,
          class_id: resolvedClassId,
          subject_id: gradeForm.subject_id,
          term_name: gradeForm.term_name,
          academic_year: gradeForm.academic_year,
          grading_system: currentSchoolGradingSystem,
          assignment_score: midTermA,
          test_score: 0,
          exam_score: endTermB,
          teacher_profile_id: profile.id
        };
        try {
          setNotice({ type: '', text: '' });
          const payloadVariants = [basePayload];
          if (String(basePayload.academic_year || '').includes('/')) {
            payloadVariants.push({ ...basePayload, academic_year: String(basePayload.academic_year || '').split('/')[0] || String(new Date().getFullYear()) });
          }

          let lastError = null;
          for (const candidate of payloadVariants) {
            const query = candidate.id
              ? supabaseClient.from('grades').update(candidate).eq('id', candidate.id)
              : supabaseClient.from('grades').insert(candidate);
            const res = await query;
            if (!res?.error) {
              resetTeacherGradeForm();
              await refreshAll();
              setNotice({ type: 'success', text: 'Grades saved successfully.' });
              return;
            }
            lastError = res.error;
          }

          setNotice({ type: 'danger', text: lastError?.message || 'Failed to save grade.' });
        } catch (error) {
          setNotice({ type: 'danger', text: error?.message || 'Failed to save grade.' });
        }
      };

      const handleCredentialSelection = (profileId) => {
        const selectedRow = roleScopedManagedUsers.find((row) => row.profile_id === profileId)
          || managedUsersRows.find((row) => row.profile_id === profileId);
        if (!selectedRow) {
          setUserForm(buildManagedForm(userForm.role_name));
          return;
        }
        const ref = managedUserRefMap[selectedRow.profile_id || selectedRow.id] || null;
        setUserForm({
          ...buildManagedForm(selectedRow.role_name || userForm.role_name),
          profile_id: selectedRow.profile_id || '',
          role_name: selectedRow.role_name || userForm.role_name,
          full_name: selectedRow.full_name || '',
          email: selectedRow.email || '',
          username: selectedRow.username || generateManagedUsername(selectedRow),
          phone: selectedRow.phone || selectedRow.profile_phone || '',
          account_status: normalizeAccountStatus(selectedRow.account_status || selectedRow.status || 'active'),
          force_password_change: String(selectedRow.force_password_change ?? true),
          temporary_password: ref?.temporary_password || ''
        });
      };

      const saveCredentialControls = async () => {
        if (!selectedManagedUser?.profile_id) {
          setNotice({ type: 'danger', text: 'Select an existing user first.' });
          return false;
        }
        if (!isUuid(selectedManagedUser.profile_id)) {
          setNotice({ type: 'danger', text: 'The selected parent is not linked to a valid profile account yet. Save the parent properly in the Parents section first.' });
          return false;
        }
        const { error: profileError } = await supabaseClient
          .from('profiles')
          .update({
            username: userForm.username || null,
            account_status: normalizeAccountStatus(userForm.account_status || 'active'),
            force_password_change: normalizeBoolean(userForm.force_password_change)
          })
          .eq('id', selectedManagedUser.profile_id);

        if (profileError) {
          setNotice({ type: 'danger', text: profileError.message || 'Failed to save credential controls.' });
          return false;
        }

        const { error: controlError } = await supabaseClient.rpc('set_managed_user_account_state', {
          p_profile_id: selectedManagedUser.profile_id,
          p_account_status: normalizeAccountStatus(userForm.account_status || 'active'),
          p_force_password_change: normalizeBoolean(userForm.force_password_change)
        });

        if (controlError) {
          setNotice({ type: 'danger', text: controlError.message || 'Failed to apply account control changes.' });
          return false;
        }

        await refreshAll();
        return true;
      };

      const handleCredentialProvisionFromForm = async () => {
        if (!selectedManagedUser) {
          setNotice({ type: 'danger', text: 'Select an existing user first.' });
          return;
        }
        await handleProvisionManagedUser({
          ...selectedManagedUser,
          username: userForm.username || selectedManagedUser.username,
          email: userForm.email || selectedManagedUser.email,
          account_status: normalizeAccountStatus(userForm.account_status || selectedManagedUser.account_status || selectedManagedUser.status || 'active'),
          force_password_change: normalizeBoolean(userForm.force_password_change)
        });
      };

      if (!sessionReady) return <div className="auth-shell"><div className="card">Loading...</div></div>;
      if (!profile) return <AuthScreen onAuthed={loadCore} />;

      if (profile.force_password_change) {
        return (
          <div className="auth-shell">
            <div className="card" style={{maxWidth:540, width:'100%'}}>
              <h2>Change Temporary Password</h2>
              <p className="subtle">You must change your password before continuing.</p>
              {notice.text && <div className={classNames('banner', notice.type)}>{notice.text}</div>}
              <div className="field"><label>New Password</label><input type="password" value={passwordForm.newPassword} onChange={(e)=>setPasswordForm({newPassword:e.target.value})} /></div>
              <div style={{marginTop:16}}><button className="btn" onClick={handleFirstLoginPasswordChange}>Update Password</button></div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-shell">
          <Sidebar role={role} page={page} setPage={setPage} user={profile} school={school} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} chatUnreadCount={chatUnreadCount} onLogout={async()=>{ if (profile?.id) markPresenceLocally(profile.id, false, new Date().toISOString()); setSelfPresenceState('offline'); await signOut(); setProfile(null); setWelcomeContext(null); }} />
          <main className="main">
            <div className="topbar">
              <div className="page-title">
                <div className="actions"><button className="btn secondary mobile-nav-toggle" onClick={() => setMobileOpen(!mobileOpen)}>Menu</button></div>
                <h2>{getPageLabel(page, role) || "Dashboard"}</h2>
                <div className="subtle">{school?.name ? `${school.name} (${currentSchoolCategory} • ${currentSchoolGradingSystem})` : 'System Administration'}</div>
              </div>
              <div className="actions">
                <button className="btn secondary" onClick={goBackPage} disabled={!pageBackStack.length}>Back</button>
                <button className="btn secondary" onClick={goForwardPage} disabled={!pageForwardStack.length}>Forward</button>
                {daysRemaining !== null && daysRemaining <= 14 && !loginLogoutOnly && <div className="banner warning">License reminder: {daysRemaining} day(s) remaining.</div>}
                {loginLogoutOnly && <div className="banner danger">System has being limited to login-logout only, period usage over, contact the Super Admin for more extended period Thank You!</div>}
              </div>
            </div>

            {notice.text && <div className={classNames("banner", notice.type)}>{notice.text}</div>}

            {page === 'super-dashboard' && (
              <div className="grid">
                <MetricCards items={[
                  { label: 'Total Schools', value: schoolsHook.rows.length },
                  { label: 'Approved Schools', value: schoolsHook.rows.filter(s=>s.approval_status==='approved').length },
                  { label: 'Pending Approvals', value: registrationsHook.rows.filter(r=>r.status==='pending').length },
                  { label: 'Recently Created Accounts', value: auditHook.rows.filter(r=>r.action_type==='CREATE').length }
                ]} />
                <div className="split">
                  <div className="card">
                    <h3>Schools Overview</h3>
                    <div className="table-wrap"><table><thead><tr><th>Category</th><th>School</th><th>Code</th><th>Status</th><th>License</th><th>End Date</th><th>Admin Login Reference</th><th>Actions</th></tr></thead><tbody>
                      {schoolsHook.rows.map(s => { const ref = schoolAdminRefMap[s.id]; const linkedRegistration = registrationByCreatedSchoolId[String(s.id || '')] || registrationBySchoolCode[String(s.school_code || '').toUpperCase()] || null; const schoolCategoryLabel = resolveSchoolCategory(s.school_category || linkedRegistration?.school_category); return <tr key={s.id}><td>{schoolCategoryLabel}</td><td>{s.name}</td><td>{s.school_code}</td><td><span className={classNames('chip', s.approval_status==='approved' ? 'success' : s.approval_status==='pending' ? 'warning' : 'danger')}>{s.approval_status}</span></td><td>{s.license_state}</td><td>{formatDate(s.license_end_date)}</td><td>{ref ? <div className="subtle"><div><strong>{ref.admin_email}</strong></div><div>Temp: {ref.temporary_password}</div><div>Issued: {formatDate(ref.issued_at)}</div><div style={{marginTop:6}}><button className="btn secondary" onClick={()=>copyText(buildSchoolAdminReferenceText(s), 'School admin credentials copied to clipboard')}>Copy</button></div></div> : <span className="subtle">No credentials saved yet</span>}</td><td><div style={{display:'flex', gap:8, flexWrap:'wrap'}}>{s.approval_status === 'approved' && <button className="btn" onClick={()=>handleProvisionSchoolAdmin(s.id)}>{ref ? 'Reset Admin Login' : 'Create Admin Login'}</button>}<button className="btn secondary" onClick={()=>handleLicenseUpdate(s.id, 1, true)}>1 Month Trial</button><button className="btn success" onClick={()=>handleLicenseUpdate(s.id, 1, false)}>+1 Year</button><button className="btn warning" onClick={()=>handleSchoolLock(s.id, true, false)}>Usage Lock</button><button className="btn danger" onClick={()=>handleSchoolLock(s.id, true, true)}>Full Lock</button></div></td></tr>})}
                    </tbody></table></div>
                  </div>
                  <div className="card">
                    <h3>Global System Control</h3>
                    <p className="subtle">Use with care. Global system shutdown disables all school activity except Super Admin access.</p>
                    <button className="btn danger" onClick={()=>withNotice(async()=>supabaseClient.rpc('set_global_system_shutdown', { p_shutdown: true }), 'Global shutdown enabled')}>Shutdown Entire System</button>
                    <button className="btn secondary" style={{marginLeft:8}} onClick={()=>withNotice(async()=>supabaseClient.rpc('set_global_system_shutdown', { p_shutdown: false }), 'Global shutdown disabled')}>Restore System</button>
                  </div>
                </div>
              </div>
            )}

            {page === 'schools' && (
              <div className="card">
                <h3>Registered Schools</h3>
                <p className="subtle">Latest school admin credential references are kept here for Super Admin review. Resetting credentials overwrites the previous reference with the newest login details.</p>
                <div className="table-wrap"><table><thead><tr><th>Category</th><th>School</th><th>Code</th><th>Status</th><th>License</th><th>End Date</th><th>Admin Name</th><th>Admin Email</th><th>Latest Temporary Password</th><th>Issued</th><th>Reference</th><th>Actions</th></tr></thead><tbody>
                  {schoolsHook.rows.map(s => {
                    const ref = schoolAdminRefMap[s.id];
                    const linkedRegistration = registrationByCreatedSchoolId[String(s.id || '')] || registrationBySchoolCode[String(s.school_code || '').toUpperCase()] || null;
                    const schoolCategoryLabel = resolveSchoolCategory(s.school_category || linkedRegistration?.school_category);
                    return <tr key={s.id}>
                      <td>{schoolCategoryLabel}</td>
                      <td>{s.name}</td>
                      <td>{s.school_code}</td>
                      <td><span className={classNames('chip', s.approval_status==='approved' ? 'success' : s.approval_status==='pending' ? 'warning' : 'danger')}>{s.approval_status}</span></td>
                      <td>{s.license_state}</td>
                      <td>{formatDate(s.license_end_date)}</td>
                      <td>{ref?.admin_full_name || 'N/A'}</td>
                      <td>{ref?.admin_email || 'N/A'}</td>
                      <td>{ref?.temporary_password || 'Not issued yet'}</td>
                      <td>{ref?.issued_at ? formatDate(ref.issued_at) : 'N/A'}</td>
                      <td>{ref ? <button className="btn secondary" onClick={()=>copyText(buildSchoolAdminReferenceText(s), 'School admin credential reference copied to clipboard')}>Copy Reference</button> : <span className="subtle">No saved reference</span>}</td>
                      <td>{s.approval_status === 'approved' ? <button className="btn" onClick={()=>handleProvisionSchoolAdmin(s.id)}>{ref ? 'Reset Admin Login' : 'Create Admin Login'}</button> : <span className="subtle">Awaiting approval</span>}</td>
                    </tr>;
                  })}
                </tbody></table></div>
              </div>
            )}

            {page === 'approvals' && (
              <div className="card">
                <h3>School Registration Approval Records</h3>
                <p className="subtle">Super Admin can approve, deny, or permanently delete pending and approved registration records. Deleting an approved record also removes the linked school and related data.</p>
                {!isSuperAdmin && <div className="banner danger">Only the Super Admin can use Approve, Deny, and Permanent Delete in School Approvals.</div>}
                <div className="table-wrap"><table><thead><tr><th>Category</th><th>School</th><th>Code</th><th>Years</th><th>Admin</th><th>Email</th><th>Status</th><th>Created School</th><th>Actions</th></tr></thead><tbody>
                  {registrationsHook.rows.map(r => <tr key={r.id}><td>{resolveSchoolCategory(r.school_category || r.category)}</td><td>{r.school_name}</td><td>{r.school_code}</td><td>{r.years_requested}</td><td>{r.admin_full_name}</td><td>{r.admin_email}</td><td><span className={classNames('chip', r.status==='approved' ? 'success' : r.status==='pending' ? 'warning' : 'danger')}>{r.status}</span></td><td>{r.created_school_id ? 'Yes' : 'No'}</td><td><div style={{display:'flex', gap:8, flexWrap:'wrap'}}>{r.status !== 'approved' && <button className="btn success" disabled={!isSuperAdmin} onClick={()=>handleSchoolApproval(r.id, 'approved')}>Approve</button>}{r.status !== 'denied' && <button className="btn secondary" disabled={!isSuperAdmin} onClick={()=>handleSchoolApproval(r.id, 'denied')}>Deny</button>}<button className="btn danger" disabled={!isSuperAdmin} onClick={()=>handlePermanentDeleteRegistration(r.id, r.school_name, r.status)}>Permanent Delete</button></div></td></tr>)}
                </tbody></table></div>
              </div>
            )}

            {page === 'licenses' && (
              <div className="card">

                  if (!trimmedClassName) {
                    setNotice({ type: 'danger', text: 'Class Name is required.' });
                    return;
                  }
                  if (!school?.id) {
                    setNotice({ type: 'danger', text: 'School context was not found. Please log in again.' });
                    return;
                  }

                  const normalizedClassName = normalizeMainClassName(trimmedClassName) || trimmedClassName;
                  const inferredLevelGroup = normalizedClassName.startsWith('Nursery')
                    ? 'Nursery'
                    : normalizedClassName.startsWith('KG')
                    ? 'Kindergarten'
                    : normalizedClassName.startsWith('Class')
                    ? 'Primary'
                    : normalizedClassName.startsWith('JHS')

                    : null;

                  const parsedCapacity = classForm.capacity === '' || classForm.capacity == null || Number.isNaN(Number(classForm.capacity))
                    ? null
                    : Number(classForm.capacity);

                  const candidatePayloads = [
                    { name: trimmedClassName, class_name: trimmedClassName, capacity: parsedCapacity, school_id: school.id },

                    { name: trimmedClassName, class_name: trimmedClassName, level_group: inferredLevelGroup, section: 'None', capacity: parsedCapacity, school_id: school.id },

                            .from('classes')
                            .update(payload)
                            .eq('id', classForm.id)
                            .eq('school_id', school.id)
                            .select()

                            .from('classes')
                            .insert(payload)
                            .select();

                        await classesHook.fetchRows();
                        await refreshAll();
                        setNotice({ type: 'success', text: 'Class saved successfully.' });
                        return;

                      lastError = error;
                    }

                    text: lastError?.message || 'Failed to save class. Please check the classes table columns and policies.'
                  });
