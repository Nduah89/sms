<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Management System</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --soft: #334155;
      --line: #e5e7eb;
      --card: #ffffff;
      --text: #0f172a;
      --text-soft: #475569;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --app-bg: #f8fafc;
      --sidebar-gradient-end: #111827;
      --auth-overlay-start: rgba(15, 23, 42, 0.58);
      --auth-overlay-end: rgba(37, 99, 235, 0.42);
      --auth-panel-start: rgba(15, 23, 42, 0.94);
      --auth-panel-end: rgba(29, 78, 216, 0.90);
      --radius: 18px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; min-height: 100%; font-family: Inter, Arial, sans-serif; background: var(--app-bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    .app-shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .sidebar {
      background: linear-gradient(180deg, var(--bg), var(--sidebar-gradient-end));
      color: white;
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
    .brand-badge { width: 46px; height: 46px; border-radius: 14px; background: rgba(255,255,255,0.1); display: grid; place-items: center; font-weight: 800; }
    .sidebar h1 { font-size: 18px; margin: 0; }
    .muted { color: #94a3b8; }
    .nav-group { margin-bottom: 18px; }
    .nav-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin: 0 0 8px; }
    .nav-btn {
      width: 100%; border: 0; background: transparent; color: white; padding: 12px 14px; border-radius: 14px;
      text-align: left; cursor: pointer; margin-bottom: 6px;
    }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.08); }
    .main { padding: 24px; overflow-x: hidden; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .topbar .page-title h2 { margin: 0 0 4px; font-size: 28px; }
    .topbar .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 0; border-radius: 14px; padding: 11px 16px; cursor: pointer; font-weight: 600;
      background: var(--primary); color: white; box-shadow: var(--shadow);
    }
    .btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--line); box-shadow: none; }
    .btn.danger { background: var(--danger); }
    .btn.warning { background: var(--warning); }
    .btn.success { background: var(--success); }
    .grid { display: grid; gap: 16px; }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cards-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cards-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cards-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
      border: 1px solid #eef2f7;
    }
    .metric { font-size: 30px; font-weight: 800; margin: 8px 0 0; }
    .subtle { color: var(--text-soft); }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .field, .field-inline { display: flex; flex-direction: column; gap: 7px; }
    .field-inline { flex: 1 1 200px; }
    .field input, .field select, .field textarea, .field-inline input, .field-inline select, .field-inline textarea {
      width: 100%; border: 1px solid var(--line); padding: 12px 14px; border-radius: 14px; background: var(--card);
    }
    .form-grid { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form-grid-3 { display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .table-wrap { overflow: auto; border-radius: 16px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; background: var(--card); }
    th, td { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; text-align: left; white-space: nowrap; }
    th { background: color-mix(in srgb, var(--app-bg) 88%, white 12%); font-size: 13px; color: var(--soft); }
    .chip { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .chip.success { background: #dcfce7; color: #166534; }
    .chip.warning { background: #fef3c7; color: #92400e; }
    .chip.danger { background: #fee2e2; color: #991b1b; }
    .chip.info { background: #dbeafe; color: #1d4ed8; }
    .split { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }

    .auth-card {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 26px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
    }
    .auth-left {
      padding: 36px;
      background: linear-gradient(180deg, var(--auth-panel-start), var(--auth-panel-end));
      color: white;
    }
    .auth-right {
      padding: 32px;
      background: rgba(255, 255, 255, 0.92);
    }
    .auth-tabs { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .auth-tab { border: 1px solid var(--line); background: var(--card); color: var(--text); padding: 10px 14px; border-radius: 999px; cursor: pointer; }
    .auth-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .banner { border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; }
    .banner.warning { background: #fff7ed; color: #9a3412; }
    .banner.success { background: #ecfdf5; color: #166534; }
    .banner.danger { background: #fef2f2; color: #991b1b; }
    .mobile-nav-toggle { display: none; }
    .empty { padding: 30px; text-align: center; color: var(--text-soft); }
    .printable { background: var(--card); padding: 24px; border-radius: 18px; border: 1px solid var(--line); }
    .chat-box { height: 420px; overflow: auto; border: 1px solid var(--line); border-radius: 16px; padding: 12px; background: var(--app-bg); }
    .msg { margin-bottom: 10px; }
    .msg.mine { text-align: right; }
    .msg .bubble { display: inline-block; max-width: 78%; padding: 10px 14px; border-radius: 16px; background: var(--card); border: 1px solid var(--line); }
    .msg.mine .bubble { background: color-mix(in srgb, var(--primary) 18%, white 82%); border-color: color-mix(in srgb, var(--primary) 28%, white 72%); }

    function getAcademicYearLabel(date = new Date()) {
      const month = date.getMonth() + 1;
      const year = date.getFullYear();
      const startYear = month >= 9 ? year : year - 1;
      return `${startYear}/${startYear + 1}`;
    }
    function getAcademicYearOptions(existingYears = []) {
      const current = getAcademicYearLabel();
      const [startText] = current.split('/');
      const startYear = Number(startText);
      const seededYears = [
        `${startYear - 1}/${startYear}`,
        current,
        `${startYear + 1}/${startYear + 2}`
      ];
      return Array.from(new Set([...seededYears, ...(existingYears || []).filter(Boolean)])).sort((a, b) => {
        const aYear = Number(String(a).split('/')[0] || 0);
        const bYear = Number(String(b).split('/')[0] || 0);
        return aYear - bYear;
      });
    }

    function parseScore(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function clampScore(value, min = 0, max = 100) {
      return Math.min(max, Math.max(min, parseScore(value)));
    }

    function ordinalLabel(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number) || number <= 0) return '-';
      const mod100 = number % 100;
      if (mod100 >= 11 && mod100 <= 13) return `${number}th`;
      const mod10 = number % 10;
      if (mod10 === 1) return `${number}st`;
      if (mod10 === 2) return `${number}nd`;
      if (mod10 === 3) return `${number}rd`;
      return `${number}th`;
    }

    function getBeceGradeDetails(percentScore) {
      const percent = clampScore(percentScore, 0, 100);
      if (percent >= 90) return { bece_grade: 1, remark: 'AA+', interpretation: 'Highest' };
      if (percent >= 80) return { bece_grade: 2, remark: 'A1', interpretation: 'Excellent' };
      if (percent >= 70) return { bece_grade: 3, remark: 'B2', interpretation: 'Very Good' };
      if (percent >= 65) return { bece_grade: 4, remark: 'B3', interpretation: 'Good' };
      if (percent >= 60) return { bece_grade: 5, remark: 'C4', interpretation: 'Credit' };
      if (percent >= 55) return { bece_grade: 6, remark: 'C5', interpretation: 'Credit' };
      if (percent >= 50) return { bece_grade: 7, remark: 'C6', interpretation: 'Pass' };
      if (percent >= 40) return { bece_grade: 8, remark: 'D7', interpretation: 'Weak Pass' };
      return { bece_grade: 9, remark: 'E8/F9', interpretation: 'Fail' };
    }

    function buildDisplayGradeRows(rows = [], studentClassLookup = new Map()) {
      const normalized = (rows || []).map((row) => {
        const midTermA = clampScore(row.assignment_score, 0, 50);
        const endTermB = clampScore(row.exam_score, 0, 50);
        const total = clampScore(row.total_score || (midTermA + endTermB), 0, 100);
        const percent = total;
        const gradeMeta = getBeceGradeDetails(percent);
        const className = String(row.class_name || studentClassLookup.get(String(row.student_id || '').trim()) || row.student_main_class_name || '-').trim() || '-';
        return {
          ...row,
          class_name: className,
          mid_term_a_score: midTermA,
          end_of_term_b_score: endTermB,
          total_ab_score: total,
          percent_score: percent,
          bece_grade: gradeMeta.bece_grade,
          remark_label: gradeMeta.remark,
          interpretation_label: gradeMeta.interpretation,
          position_label: '-'
        };
      });

      const groups = new Map();
      normalized.forEach((row) => {
        const key = [row.class_name || '-', row.term_name || '-', row.academic_year || '-'].join('::');
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });

      groups.forEach((groupRows) => {
        groupRows.sort((a, b) => {
          const scoreDiff = Number(b.total_ab_score || 0) - Number(a.total_ab_score || 0);
          if (scoreDiff !== 0) return scoreDiff;
          return String(a.student_name || '').localeCompare(String(b.student_name || ''));
        });
        let displayRank = 0;
        let previousScore = null;
        groupRows.forEach((row, index) => {
          const currentScore = Number(row.total_ab_score || 0);
          if (previousScore === null || currentScore !== previousScore) {
            displayRank = index + 1;
            previousScore = currentScore;
          }
          row.position_label = ordinalLabel(displayRank);
        });
      });

      return normalized;
    }

    function useSupabaseTable(table, select = "*") {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const fetchRows = async (queryBuilder) => {
        setLoading(true);
        setError("");
        let query = supabaseClient.from(table).select(select);
        if (queryBuilder) query = queryBuilder(query);
        const { data, error } = await query;
        if (error) setError(error.message);
        setRows(data || []);
        setLoading(false);
        return { data, error };
      };

      return { rows, setRows, loading, error, fetchRows };
    }

    async function getCurrentProfile(authUserOverride = null) {
      let authUser = authUserOverride;
      if (!authUser) {
        const { data: sessionData } = await supabaseClient.auth.getSession();
        authUser = sessionData?.session?.user || null;
      }
      if (!authUser) return null;
      const { data, error } = await supabaseClient
        .from("v_current_user_profile")
        .select("*")
        .single();
      if (error) return { authUser, profile: null, profileError: error };
      return { authUser, profile: data, profileError: null };

      const raw = String(identifier || '').trim();
      if (!raw) return '';
      if (raw.includes('@')) return raw.toLowerCase();
      try {
        const { data, error } = await supabaseClient.rpc('resolve_login_identifier', { p_identifier: raw });
        if (error) return raw;
        return String(data || raw).trim().toLowerCase();
      } catch {
        return raw;

    function getFriendlyErrorMessage(error) {
      const message = error?.message || "Unexpected error";
      if (/Failed to fetch/i.test(message)) {
        return "Network or configuration error. Confirm the Supabase URL and publishable key are correct, your internet connection is working, and open this app through http://localhost or a hosted site instead of file://.";

    function AuthScreen({ onAuthed }) {
      const [tab, setTab] = useState("login");
      const [status, setStatus] = useState({ type: "", text: "" });
      const [loginForm, setLoginForm] = useState({ email: "", password: "" });
      const [registerForm, setRegisterForm] = useState({
        school_name: "", school_address: "", school_contact: "", municipality: "", school_code: "", years_requested: 1,
        admin_full_name: "", admin_email: "", admin_phone: "", password: ""
      });
      const [superForm, setSuperForm] = useState({ email: "", password: "" });
      const [isGeneratingSchoolCode, setIsGeneratingSchoolCode] = useState(false);
      const logoRef = useRef(null);

      const buildSchoolCodeBase = (schoolName) => {
        const words = String(schoolName || '')
          .toUpperCase()
          .replace(/[^A-Z0-9\s]/g, ' ')
          .split(/\s+/)
          .filter(Boolean);

        const initials = words.map((word) => word[0]).join('').slice(0, 6);
        const fallback = words.join('').slice(0, 6);
        return (initials || fallback || 'SCH').toUpperCase();
      };

      const buildLocalSchoolCode = (schoolName) => {
        const base = buildSchoolCodeBase(schoolName);
        const seed = String(schoolName || '')
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, '')
          .split('')
          .reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
        const suffix = String((seed % 900) + 100).padStart(3, '0');
        return `${base}${suffix}`;
      };

      const requestGeneratedSchoolCode = async (schoolName) => {
        const trimmedName = String(schoolName || '').trim();
        if (!trimmedName) return '';
        const fallbackCode = buildLocalSchoolCode(trimmedName);
        const { data, error } = await supabaseClient.rpc('generate_school_code', { p_school_name: trimmedName });
        if (error) return fallbackCode;
        return String(data || fallbackCode).toUpperCase();
      };

      useEffect(() => {
        const trimmedName = String(registerForm.school_name || '').trim();

        if (!trimmedName) {
          setRegisterForm((prev) => ({ ...prev, school_code: '' }));
          return;
        }

        let active = true;
        const timer = setTimeout(async () => {
          setIsGeneratingSchoolCode(true);
          const generatedCode = await requestGeneratedSchoolCode(trimmedName);
          if (!active) return;
          setRegisterForm((prev) => {
            if (String(prev.school_name || '').trim() !== trimmedName) return prev;
            return { ...prev, school_code: generatedCode };
          });
          setIsGeneratingSchoolCode(false);
        }, 350);

        return () => {
          active = false;
          clearTimeout(timer);
        };
      }, [registerForm.school_name]);

      const handleLogin = async (e, isSuper = false) => {
        e.preventDefault();
        setStatus({ type: "", text: "" });
        const form = isSuper ? superForm : loginForm;
        try {
          window.sessionStorage.setItem("sms_login_surface", isSuper ? "super_admin" : "school");
        } catch {}
        const { error } = await signIn(form.email, form.password);
        if (error) {
          try { window.sessionStorage.removeItem("sms_login_surface"); } catch {}
          return setStatus({ type: "danger", text: getFriendlyErrorMessage(error) });
        }
        // Let onAuthStateChange handle bootstrap after sign in to avoid race conditions.
        setStatus({ type: "success", text: "Login successful. Preparing your dashboard..." });
      };

      const handleRegister = async (e) => {
        e.preventDefault();
        setStatus({ type: "", text: "" });

        const resolvedSchoolCode = await requestGeneratedSchoolCode(registerForm.school_name);
        if (!resolvedSchoolCode) {
          return setStatus({ type: "danger", text: "Enter the school name first so the system can generate a unique school code." });
        }

        const payload = {
          school_name: registerForm.school_name,
          school_address: registerForm.school_address,
          school_contact: registerForm.school_contact,
          municipality: registerForm.municipality,
          school_code: resolvedSchoolCode,
          years_requested: Number(registerForm.years_requested),
          admin_full_name: registerForm.admin_full_name,
          admin_email: registerForm.admin_email,
          admin_phone: registerForm.admin_phone,
          requested_password: registerForm.password
        };

        const file = logoRef.current?.files?.[0];
        if (file && data) {
          await uploadFile(`school-registrations/${data}/${Date.now()}-${file.name}`, file);
        }
        setRegisterForm((prev) => ({ ...prev, school_code: resolvedSchoolCode }));
        setStatus({ type: "success", text: `Registration submitted. School code: ${resolvedSchoolCode}. Await Super Admin approval.` });
        setTab("login");
      };

        <div className="auth-shell">

                  <strong>Schools</strong>

    function GenericCrudPage({ title, description, columns, rows, formState, setFormState, onSave, onDelete, onEdit, loading, filters, children, extraActions, rowActions, fields }) {
      const renderedFields = fields || Object.keys(formState).map((key) => ({ key, label: key.replace(/_/g, " "), type: "text" }));
      return (
        <div className="grid">
          <div className="card">
            <h3 style={{marginTop:0}}>{title}</h3>
            <p className="subtle">{description}</p>
            {filters}
            <div className="form-grid-3">
              {renderedFields.map((field) => {
                const key = field.key;
                const label = field.label || key.replace(/_/g, ' ');
                const value = formState[key] ?? (field.type === 'multiselect' ? [] : '');
                const setValue = (next) => setFormState({ ...formState, [key]: next });
                return (
                  <div className="field" key={key}>
                    <label>{label}</label>
                    {field.type === 'select' ? (
                      <select value={value} onChange={(e) => setValue(e.target.value)} disabled={field.disabled} readOnly={field.readOnly}>
                        {(field.options || []).map((opt) => {
                          const option = typeof opt === 'string' ? { value: opt, label: opt } : opt;
                          return <option key={option.value} value={option.value}>{option.label}</option>;
                        })}
                      </select>
                    ) : field.type === 'date' ? (
                      <input type="date" value={value || ''} onChange={(e) => setValue(e.target.value)} disabled={field.disabled} readOnly={field.readOnly} />
                    ) : field.type === 'multiselect' ? (
                      <select multiple value={Array.isArray(value) ? value : []} onChange={(e) => setValue(Array.from(e.target.selectedOptions).map(o => o.value))} style={{minHeight:120}} disabled={field.disabled}>
                        {(field.options || []).map((opt) => {
                          const option = typeof opt === 'string' ? { value: opt, label: opt } : opt;
                          return <option key={option.value} value={option.value}>{option.label}</option>;
                        })}
                      </select>
                    ) : (
                      <input type={field.type || 'text'} value={value ?? ''} onChange={(e)=>setValue(e.target.value)} placeholder={field.placeholder || ''} disabled={field.disabled} readOnly={field.readOnly} />
                    )}
                  </div>
                );

                </tbody>
              </table>
            </div>
          </div>
        </div>
      );

              type: 'danger',

        if (!file) return;
        setImportStatus('Parsing CSV...');
        window.Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: async (result) => {
            const rows = result.data.map(r => ({
              full_name: r.full_name,
              student_no: r.student_no,
              gender: r.gender,
              date_of_birth: r.date_of_birth,
              guardian_contact: r.guardian_contact,
              address: r.address,
              class_id: r.class_id
            }));
            setImportStatus(`Uploading ${rows.length} students...`);
            const chunkSize = 500;
            for (let i = 0; i < rows.length; i += chunkSize) {
              const chunk = rows.slice(i, i + chunkSize);
              const { error } = await supabaseClient.from('students').insert(chunk);
              if (error) {
                setImportStatus(`Import failed at row ${i + 1}: ${error.message}`);
                return;
              }
              setImportStatus(`Imported ${Math.min(i + chunk.length, rows.length)} of ${rows.length}`);
            }

            refreshAll();

          error: (error) => setImportStatus(error.message)
        });

      const principalTeacherPresenceRows = useMemo(() => {
        const teacherRowMap = Object.fromEntries(mergedTeachersRows.map((row) => [row.id, row]));
        const uniqueAssignments = [];
        const seen = new Set();

        (subjectAssignmentsHook.rows || []).forEach((assignment) => {
          const teacherRow = teacherRowMap[assignment.teacher_id] || null;
          const teacherProfileId = assignment.teacher_profile_id || teacherRow?.profile_id || null;
          const key = [
            teacherProfileId || assignment.teacher_id || assignment.teacher_name || 'teacher',
            assignment.class_id || assignment.class_name || 'class',
            assignment.subject_name || 'subject'
          ].join('::');
          if (seen.has(key)) return;
          seen.add(key);

          const matchingAttendance = attendanceRowsToday.find((row) => {
            const sameTeacher = teacherProfileId
              ? row.marked_by_profile_id === teacherProfileId
              : (row.marked_by_name || '') === (assignment.teacher_name || '');
            const sameClass = assignment.class_id ? row.class_id === assignment.class_id : (row.class_name || '') === (assignment.class_name || '');
            const sameSubject = assignment.subject_name
              ? ((row.subject_name || '') === assignment.subject_name || !(row.subject_name || '').trim())
              : true;
            return sameTeacher && sameClass && sameSubject;
          });

          uniqueAssignments.push({
            id: assignment.id || key,
            teacher_name: assignment.teacher_name || teacherRow?.full_name || 'Teacher',
            class_name: assignment.class_name || classNameMap[assignment.class_id] || 'Class',
            subject_name: assignment.subject_name || 'Subject',
            status: matchingAttendance ? 'Present' : 'Absent',
            marked_at: matchingAttendance?.updated_at || matchingAttendance?.created_at || null,
            recorded_by_name: matchingAttendance?.marked_by_name || assignment.teacher_name || teacherRow?.full_name || 'Teacher'
          });
        });

        return uniqueAssignments.sort((a, b) => {
          if (a.status !== b.status) return a.status === 'Absent' ? -1 : 1;
          return String(a.teacher_name).localeCompare(String(b.teacher_name));

        };

      const principalPerformanceOverview = useMemo(() => {

          .filter((value) => Number.isFinite(value));
        const overallAverage = averages.length ? (averages.reduce((sum, value) => sum + value, 0) / averages.length) : 0;
        return {
          gradeEntries: rows.length,
          overallAverage: overallAverage.toFixed(1),
          uniqueStudents: new Set(rows.map((row) => row.student_id || row.student_name).filter(Boolean)).size
        };
      }, [gradesHook.rows]);

      const principalClassPerformanceRows = useMemo(() => {

          current.count += 1;
          current.total += Number(row.average_score || row.total_score || 0);
          grouped.set(key, current);
        });
        return Array.from(grouped.values())
          .map((row) => ({
            ...row,
            average_score: row.count ? (row.total / row.count).toFixed(1) : '0.0'

        }));

              username: userRow?.username || ref.username || '-',
              temporary_password: ref.temporary_password || ''
            };
          });
      }, [userLoginRefsHook.rows, managedUsersRows]);

      const dashboardMetrics = useMemo(() => {

          if (key === 'present') acc.present += 1;
          else if (key === 'absent') acc.absent += 1;
          else if (key === 'late') acc.late += 1;
          return acc;
        }, { present: 0, absent: 0, late: 0 });

        return {
          studentCount: mergedStudentsRows.length,
          teacherCount: mergedTeachersRows.length,
          parentCount: computedParentsRows.length,
          accountsCount: accountsHook.rows.length,

          attendanceAbsent: attendanceSummary.absent,
          attendanceLate: attendanceSummary.late
        };
      }, [mergedStudentsRows, mergedTeachersRows, computedParentsRows, accountsHook.rows, principalsHook.rows, classesHook.rows, feesHook.rows, attendanceHook.rows, dashboardRecentAccounts]);

      const getManagedControlDraft = (row) => accountControlDrafts[row.profile_id] || {

      };

        }));

      const generateStudentNoForCurrentSchool = async (setter) => {

        if (error) return setNotice({ type: 'danger', text: error.message || 'Failed to generate student number' });
        setter((prev) => ({ ...prev, student_no: data || '' }));
      };

      const generateStaffNoForCurrentSchool = async (setter) => {

        if (error) return setNotice({ type: 'danger', text: error.message || 'Failed to generate staff number' });
        setter((prev) => ({ ...prev, staff_no: data || '' }));
        return data || '';
      };

      const ensureTeacherStaffNo = async (form, setter = null) => {
        if ((form?.role_name || '') !== 'teacher') return form?.staff_no || '';
        if (form?.staff_no) return form.staff_no;
        const generated = await generateStaffNoForCurrentSchool(setter || setTeacherForm);
        return generated || '';
      };

      const normalizeBoolean = (value) => value === true || value === 'true';

      const resetManagedForm = (setter, roleName) => setter(buildManagedForm(roleName));

      const saveManagedUserRecord = async (form, setter, fallbackRole = null) => {
        if (!canSchoolAdminManageUsers) {
          setNotice({ type: 'danger', text: 'Only the school admin can create or edit managed user records.' });
          return;
        }

        const roleName = form.role_name || fallbackRole;
        if (!roleName) {
          setNotice({ type: 'danger', text: 'Select a role before saving.' });
          return;
        }

        const resolvedStaffNo = roleName === 'teacher'
          ? (await ensureTeacherStaffNo(form, setter)) || null
          : (form.staff_no || null);

        const resolvedStudentClassId = roleName === 'student'
          ? await ensureStudentClassId(form)
          : null;

        const resolvedTeacherClassId = roleName === 'teacher'
          ? await ensureTeacherClassId(form)
          : null;

        if (roleName === 'student' && !resolvedStudentClassId) {
          setNotice({ type: 'danger', text: 'Select one of the classes created under the school admin Classes section.' });
          return;
        }

        if (roleName === 'teacher' && form.teacher_main_class_name && !resolvedTeacherClassId) {
          setNotice({ type: 'danger', text: 'Failed to resolve or create the selected teacher main class.' });
          return;
        }

        const payload = {
          p_role: roleName,
          p_profile_id: form.profile_id || null,
          p_full_name: form.full_name || null,
          p_email: roleName === 'student' ? null : (form.email || null),
          p_phone: form.phone || null,
          p_username: roleName === 'student' ? null : (form.username || null),
          p_account_status: normalizeAccountStatus(form.account_status || 'active'),
          p_force_password_change: normalizeBoolean(form.force_password_change),
          p_class_id: roleName === 'student' ? resolvedStudentClassId : (roleName === 'teacher' ? resolvedTeacherClassId : (form.class_id || null)),
          p_gender: form.gender || null,
          p_date_of_birth: form.date_of_birth || null,
          p_guardian_contact: roleName === 'student' ? null : (form.guardian_contact || null),
          p_address: roleName === 'student' ? null : (form.address || null),
          p_student_no: form.student_no || null,
          p_staff_no: resolvedStaffNo,
          p_subject_specialty: form.subject_specialty || null,
          p_qualification: form.qualification || null,
          p_assigned_subjects: Array.isArray(form.assigned_subjects) ? form.assigned_subjects : [],
          p_assigned_class_ids: Array.isArray(form.assigned_class_ids) ? form.assigned_class_ids : [],
          p_relationship_to_student: form.relationship_to_student || null
        };

        const { error } = await supabaseClient.rpc('upsert_managed_user_record', payload);
        if (error) {
          setNotice({ type: 'danger', text: error.message || 'Failed to save managed user record' });
          return;
        }

        let syncError = null;
        await refreshAll();

        if (roleName === 'teacher') {
          syncError = await syncTeacherExtraFields(form);
        }
        if (roleName === 'student') {
          syncError = await syncStudentParentData(form);
        }

        await refreshAll();
        setNotice({ type: syncError ? 'warning' : 'success', text: syncError ? `${roleName.replace('_',' ')} record saved, but some extended details could not be synced automatically. ${syncError.message || ''}` : `${roleName.replace('_',' ')} record saved successfully.` });

        if (!file) return setNotice({ type: 'danger', text: 'Choose a logo image first.' });

        const { error: uploadError } = await uploadFile(path, file);
        if (uploadError) return setNotice({ type: 'danger', text: uploadError.message || 'Failed to upload school logo' });
        const { data: publicData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(path);

          logo_url: publicData?.publicUrl || null,

        const { data, error } = await query.maybeSingle();

        const { error } = await supabaseClient
          .from('teachers')

            gender: form.gender || null,

        if (!school?.id) return null;
        const studentRow = await getLatestStudentRow(form);

        const { error: studentUpdateError } = await supabaseClient
          .from('students')
          .update({
            parent_full_name: form.parent_full_name || null,
            parent_contact: form.parent_contact || null,

          return studentUpdateError;
        }

        if (!form.parent_full_name && !form.parent_contact) {
          await supabaseClient.from('parent_student_links').delete().eq('student_id', studentRow.id);
          return null;
        }

        let parentRecord = null;
        const { data: existingParent } = await supabaseClient
          .from('parents')
          .select('*')
          .eq('school_id', school.id)
          .eq('full_name', form.parent_full_name || '')
          .eq('phone', form.parent_contact || '')
          .maybeSingle();

        if (existingParent?.id) {
          parentRecord = existingParent;
          await supabaseClient
            .from('parents')
            .update({
              full_name: form.parent_full_name || existingParent.full_name,
              phone: form.parent_contact || existingParent.phone,
              relationship_to_student: form.relationship_to_student || existingParent.relationship_to_student || 'Parent',
              status: existingParent.status || 'active'
            })
            .eq('id', existingParent.id);
        } else {
          const { data: insertedParent, error: parentInsertError } = await supabaseClient
            .from('parents')
            .insert({
              school_id: school.id,
              profile_id: null,
              full_name: form.parent_full_name || null,
              phone: form.parent_contact || null,
              email: null,
              relationship_to_student: form.relationship_to_student || 'Parent',
              status: 'active'
            })
            .select('*')
            .single();
          if (parentInsertError) {
            return parentInsertError;
          }
          parentRecord = insertedParent;
        }

        if (parentRecord?.id) {
          await supabaseClient.from('parent_student_links').delete().eq('student_id', studentRow.id).neq('parent_id', parentRecord.id);
          const { data: linkExists } = await supabaseClient
            .from('parent_student_links')
            .select('parent_id, student_id')
            .eq('parent_id', parentRecord.id)
            .eq('student_id', studentRow.id)
            .maybeSingle();
          if (!linkExists) {
            await supabaseClient.from('parent_student_links').insert({ parent_id: parentRecord.id, student_id: studentRow.id });
          }
        }
        return null;
      };

      const setManagedUserStatus = async (row, nextStatus) => {
        const profileId = row?.profile_id || row?.id;
        if (!profileId) {
          setNotice({ type: 'danger', text: 'No linked profile was found for this record.' });
          return;
        }
        const { error } = await supabaseClient.rpc('set_managed_user_account_state', {
          p_profile_id: profileId,
          p_account_status: normalizeAccountStatus(nextStatus),
          p_force_password_change: normalizeBoolean(row.force_password_change ?? true)
        });
        if (error) {
          setNotice({ type: 'danger', text: error.message || 'Failed to update user status.' });
          return;
        }
        setNotice({ type: 'success', text: `User status changed to ${normalizeAccountStatus(nextStatus)}.` });
        await refreshAll();
      };

      const openManagedUserInCredentials = (row) => {
        const ref = managedUserRefMap[row.profile_id || row.id] || null;
        setUserForm({
          ...buildManagedForm(row.role_name || 'student'),
          profile_id: row.profile_id || '',
          role_name: row.role_name || 'student',
          full_name: row.full_name || '',
          email: row.email || '',
          username: row.username || generateManagedUsername(row),
          phone: row.phone || row.profile_phone || '',
          account_status: normalizeAccountStatus(row.account_status || row.status || 'active'),
          force_password_change: String(row.force_password_change ?? true),
          temporary_password: ref?.temporary_password || '',
          class_id: row.class_id || '',
          gender: row.gender || 'Male',
          date_of_birth: row.date_of_birth || '',
          guardian_contact: row.guardian_contact || '',
          address: row.address || '',
          student_no: row.student_no || '',
          staff_no: row.staff_no || '',
          subject_specialty: row.subject_specialty || '',
          qualification: row.qualification || '',
          assigned_subjects: row.assigned_subjects || [],
          assigned_class_ids: row.assigned_class_ids || [],
          relationship_to_student: row.relationship_to_student || '',
          parent_full_name: row.parent_full_name || '',
          parent_contact: row.parent_contact || '',
          emis_code: row.emis_code || '',
          ghana_card: row.ghana_card || '',
          trained_status: row.trained_status || 'Trained'
        });
        setPage('users');
      };

      const roleScopedManagedUsers = useMemo(() => {
        return [...managedUsersRows]
          .filter((row) => row.role_name === userForm.role_name)
          .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')));
      }, [managedUsersRows, userForm.role_name]);

      const selectedManagedUser = useMemo(() => {
        return managedUsersRows.find((row) => row.profile_id === userForm.profile_id) || null;
      }, [managedUsersRows, userForm.profile_id]);

      const schoolSubjectRows = useMemo(() => {
        return [...(subjectsHook.rows || [])].sort((a, b) => String(a.subject_name || '').localeCompare(String(b.subject_name || '')));
      }, [subjectsHook.rows]);

      const schoolSubjectOptions = useMemo(() => ([
        { value: '', label: 'Select Subject' },
        ...schoolSubjectRows.map((row) => ({ value: row.id, label: row.subject_name }))
      ]), [schoolSubjectRows]);

      const teacherGradeRows = useMemo(() => {
        if (role !== ROLE.TEACHER) return gradesHook.rows || [];
        return (gradesHook.rows || []).filter((row) => String(row.teacher_profile_id || '') === String(profile?.id || ''));
      }, [gradesHook.rows, role, profile?.id]);


      const teacherGradeClassOptions = useMemo(() => (
        [{ value: '', label: 'All Classes' }].concat(
          orderedClassRows.map((row) => {
            const display = buildClassDisplay(row) || row.name || row.class_name || '';
            return { value: display, label: display };
          }).filter((option) => option.value)
        )
      ), [orderedClassRows]);

      const teacherGradeStudentOptions = useMemo(() => {
        return (teacherAssignableStudents || [])
          .filter((student) => {
            if (!gradeForm.filter_class_name) return true;
            const linkedClassRow = orderedClassRows.find((row) => row.id === student.class_id) || null;
            const classValue = String(buildClassDisplay(linkedClassRow) || student.student_main_class_name || classNameMap[student.class_id] || student.class_name || '').trim();
            return classValue === gradeForm.filter_class_name;
          })
          .sort((a, b) => String(a.full_name || '').localeCompare(String(b.full_name || '')));
      }, [teacherAssignableStudents, gradeForm.filter_class_name, classNameMap, orderedClassRows]);

      const teacherAcademicYearOptions = useMemo(() => (
        getAcademicYearOptions(
          Array.from(new Set((teacherGradeRows || []).map((row) => String(row.academic_year || '').trim()).filter(Boolean)))
        )
      ), [teacherGradeRows]);

      const teacherDisplayGradeRows = useMemo(() => {
        const filteredRows = (teacherGradeRows || []).filter((row) => {
          const className = String(row.class_name || principalStudentClassLookup.get(String(row.student_id || '').trim()) || '').trim();
          if (gradeForm.filter_class_name && className !== gradeForm.filter_class_name) return false;
          if (gradeForm.term_name && String(row.term_name || '') !== gradeForm.term_name) return false;
          if (gradeForm.academic_year && String(row.academic_year || '') !== gradeForm.academic_year) return false;
          return true;
        });
        return buildDisplayGradeRows(filteredRows, principalStudentClassLookup);
      }, [teacherGradeRows, gradeForm.filter_class_name, gradeForm.term_name, gradeForm.academic_year, principalStudentClassLookup]);

      const principalDisplayPerformanceRows = useMemo(() => (
        buildDisplayGradeRows(principalPerformanceRows, principalStudentClassLookup)
      ), [principalPerformanceRows, principalStudentClassLookup]);

      const resetTeacherGradeForm = () => {
        setGradeForm({ id: '', student_id: '', subject_id: '', term_name: 'Term 1', academic_year: getAcademicYearLabel(), filter_class_name: '', mid_term_a_score: '', end_of_term_raw_score: '' });
        setShowGradeEditor(false);
      };

      const openTeacherGradeEditor = (row = null) => {
        if (!row) {
          setGradeForm((prev) => ({ ...prev, id: '', student_id: '', subject_id: '', term_name: prev.term_name || 'Term 1', academic_year: prev.academic_year || getAcademicYearLabel(), mid_term_a_score: '', end_of_term_raw_score: '' }));
          setShowGradeEditor(true);
          return;
        }
        const classValue = String(row.class_name || principalStudentClassLookup.get(String(row.student_id || '').trim()) || '').trim();
        setGradeForm((prev) => ({
          ...prev,
          id: row.id || '',
          filter_class_name: classValue,
          student_id: row.student_id || '',
          subject_id: row.subject_id || '',
          term_name: row.term_name || 'Term 1',
          academic_year: row.academic_year || getAcademicYearLabel(),
          mid_term_a_score: String(clampScore(row.assignment_score, 0, 50)),
          end_of_term_raw_score: String(clampScore(Number(row.exam_score || 0) * 2, 0, 100))

        setShowGradeEditor(true);

      const saveTeacherGrade = async () => {
        const midTermA = clampScore(gradeForm.mid_term_a_score, 0, 50);

          student_id: gradeForm.student_id,
          subject_id: gradeForm.subject_id,
          term_name: gradeForm.term_name,
          academic_year: gradeForm.academic_year,

          exam_score: endTermB

      const handleCredentialSelection = (profileId) => {
        const selectedRow = managedUsersRows.find((row) => row.profile_id === profileId);
        if (!selectedRow) {
          setUserForm(buildManagedForm(userForm.role_name));

        const ref = managedUserRefMap[selectedRow.profile_id || selectedRow.id] || null;

          temporary_password: ref?.temporary_password || ''

          setNotice({ type: 'danger', text: 'Select an existing user first.' });
          return false;
        }
        const { error: profileError } = await supabaseClient
          .from('profiles')
          .update({
            username: userForm.username || null,
            account_status: normalizeAccountStatus(userForm.account_status || 'active'),
            force_password_change: normalizeBoolean(userForm.force_password_change)

          setNotice({ type: 'danger', text: profileError.message || 'Failed to save credential controls.' });
          return false;
        }

        const { error: controlError } = await supabaseClient.rpc('set_managed_user_account_state', {
          p_profile_id: selectedManagedUser.profile_id,
          p_account_status: normalizeAccountStatus(userForm.account_status || 'active'),
          p_force_password_change: normalizeBoolean(userForm.force_password_change)
        });

        if (controlError) {
          setNotice({ type: 'danger', text: controlError.message || 'Failed to apply account control changes.' });
          return false;
        }

        await refreshAll();
        return true;

        if (!selectedManagedUser) {
          setNotice({ type: 'danger', text: 'Select an existing user first.' });
          return;

        await handleProvisionManagedUser({
          ...selectedManagedUser,
          username: userForm.username || selectedManagedUser.username,
          email: userForm.email || selectedManagedUser.email,
          account_status: normalizeAccountStatus(userForm.account_status || selectedManagedUser.account_status || selectedManagedUser.status || 'active'),
          force_password_change: normalizeBoolean(userForm.force_password_change)
        });
      };

      if (!sessionReady) return <div className="auth-shell"><div className="card">Loading...</div></div>;
      if (!profile) return <AuthScreen onAuthed={loadCore} />;

      if (profile.force_password_change) {
        return (
          <div className="auth-shell">
            <div className="card" style={{maxWidth:540, width:'100%'}}>
              <h2>Change Temporary Password</h2>
              <p className="subtle">You must change your password before continuing.</p>
              {notice.text && <div className={classNames('banner', notice.type)}>{notice.text}</div>}
              <div className="field"><label>New Password</label><input type="password" value={passwordForm.newPassword} onChange={(e)=>setPasswordForm({newPassword:e.target.value})} /></div>
              <div style={{marginTop:16}}><button className="btn" onClick={handleFirstLoginPasswordChange}>Update Password</button></div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-shell">
          <Sidebar role={role} page={page} setPage={setPage} user={profile} school={school} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} onLogout={async()=>{await signOut(); setProfile(null); setWelcomeContext(null);}} />
          <main className="main">
            <div className="topbar">
              <div className="page-title">
                <div className="actions"><button className="btn secondary mobile-nav-toggle" onClick={() => setMobileOpen(!mobileOpen)}>Menu</button></div>
                <h2>{getPageLabel(page, role) || "Dashboard"}</h2>
                <div className="subtle">{school?.name || 'System Administration'}</div>
              </div>
              <div className="actions">
                {daysRemaining !== null && daysRemaining <= 14 && !loginLogoutOnly && <div className="banner warning">License reminder: {daysRemaining} day(s) remaining.</div>}
                {loginLogoutOnly && <div className="banner danger">System has being limited to login-logout only, period usage over, contact the Super Admin for more extended period Thank You!</div>}
              </div>
            </div>

            {notice.text && <div className={classNames("banner", notice.type)}>{notice.text}</div>}

            {page === 'super-dashboard' && (
              <div className="grid">
                <MetricCards items={[
                  { label: 'Total Schools', value: schoolsHook.rows.length },
                  { label: 'Approved Schools', value: schoolsHook.rows.filter(s=>s.approval_status==='approved').length },
                  { label: 'Pending Approvals', value: registrationsHook.rows.filter(r=>r.status==='pending').length },
                  { label: 'Recently Created Accounts', value: auditHook.rows.filter(r=>r.action_type==='CREATE').length }
                ]} />
                <div className="split">
                  <div className="card">
                    <h3>Schools Overview</h3>
                    <div className="table-wrap"><table><thead><tr><th>School</th><th>Code</th><th>Status</th><th>License</th><th>End Date</th><th>Admin Login Reference</th><th>Actions</th></tr></thead><tbody>
                      {schoolsHook.rows.map(s => { const ref = schoolAdminRefMap[s.id]; return <tr key={s.id}><td>{s.name}</td><td>{s.school_code}</td><td><span className={classNames('chip', s.approval_status==='approved' ? 'success' : s.approval_status==='pending' ? 'warning' : 'danger')}>{s.approval_status}</span></td><td>{s.license_state}</td><td>{formatDate(s.license_end_date)}</td><td>{ref ? <div className="subtle"><div><strong>{ref.admin_email}</strong></div><div>Temp: {ref.temporary_password}</div><div>Issued: {formatDate(ref.issued_at)}</div><div style={{marginTop:6}}><button className="btn secondary" onClick={()=>copyText(buildSchoolAdminReferenceText(s), 'School admin credentials copied to clipboard')}>Copy</button></div></div> : <span className="subtle">No credentials saved yet</span>}</td><td><div style={{display:'flex', gap:8, flexWrap:'wrap'}}>{s.approval_status === 'approved' && <button className="btn" onClick={()=>handleProvisionSchoolAdmin(s.id)}>{ref ? 'Reset Admin Login' : 'Create Admin Login'}</button>}<button className="btn secondary" onClick={()=>handleLicenseUpdate(s.id, 1, true)}>1 Month Trial</button><button className="btn success" onClick={()=>handleLicenseUpdate(s.id, 1, false)}>+1 Year</button><button className="btn warning" onClick={()=>handleSchoolLock(s.id, true, false)}>Usage Lock</button><button className="btn danger" onClick={()=>handleSchoolLock(s.id, true, true)}>Full Lock</button></div></td></tr>})}
                    </tbody></table></div>
                  </div>
                  <div className="card">
                    <h3>Global System Control</h3>
                    <p className="subtle">Use with care. Global system shutdown disables all school activity except Super Admin access.</p>
                    <button className="btn danger" onClick={()=>withNotice(async()=>supabaseClient.rpc('set_global_system_shutdown', { p_shutdown: true }), 'Global shutdown enabled')}>Shutdown Entire System</button>
                    <button className="btn secondary" style={{marginLeft:8}} onClick={()=>withNotice(async()=>supabaseClient.rpc('set_global_system_shutdown', { p_shutdown: false }), 'Global shutdown disabled')}>Restore System</button>
                  </div>
                </div>
              </div>
            )}

            {page === 'schools' && (
              <div className="card">
                <h3>Registered Schools</h3>
                <p className="subtle">Latest school admin credential references are kept here for Super Admin review. Resetting credentials overwrites the previous reference with the newest login details.</p>
                <div className="table-wrap"><table><thead><tr><th>School</th><th>Code</th><th>Status</th><th>License</th><th>End Date</th><th>Admin Name</th><th>Admin Email</th><th>Latest Temporary Password</th><th>Issued</th><th>Reference</th><th>Actions</th></tr></thead><tbody>
                  {schoolsHook.rows.map(s => {
                    const ref = schoolAdminRefMap[s.id];
                    return <tr key={s.id}>
                      <td>{s.name}</td>
                      <td>{s.school_code}</td>
                      <td><span className={classNames('chip', s.approval_status==='approved' ? 'success' : s.approval_status==='pending' ? 'warning' : 'danger')}>{s.approval_status}</span></td>
                      <td>{s.license_state}</td>
                      <td>{formatDate(s.license_end_date)}</td>
                      <td>{ref?.admin_full_name || 'N/A'}</td>
                      <td>{ref?.admin_email || 'N/A'}</td>
                      <td>{ref?.temporary_password || 'Not issued yet'}</td>
                      <td>{ref?.issued_at ? formatDate(ref.issued_at) : 'N/A'}</td>
                      <td>{ref ? <button className="btn secondary" onClick={()=>copyText(buildSchoolAdminReferenceText(s), 'School admin credential reference copied to clipboard')}>Copy Reference</button> : <span className="subtle">No saved reference</span>}</td>
                      <td>{s.approval_status === 'approved' ? <button className="btn" onClick={()=>handleProvisionSchoolAdmin(s.id)}>{ref ? 'Reset Admin Login' : 'Create Admin Login'}</button> : <span className="subtle">Awaiting approval</span>}</td>
                    </tr>;

                </tbody></table></div>
              </div>

            {page === 'approvals' && (
              <div className="card">
                <h3>School Registration Approval Records</h3>
                <p className="subtle">Super Admin can approve, deny, or permanently delete pending and approved registration records. Deleting an approved record also removes the linked school and related data.</p>

                <div className="table-wrap"><table><thead><tr><th>School</th><th>Code</th><th>Years</th><th>Admin</th><th>Email</th><th>Status</th><th>Created School</th><th>Actions</th></tr></thead><tbody>
                  {registrationsHook.rows.map(r => <tr key={r.id}><td>{r.school_name}</td><td>{r.school_code}</td><td>{r.years_requested}</td><td>{r.admin_full_name}</td><td>{r.admin_email}</td><td><span className={classNames('chip', r.status==='approved' ? 'success' : r.status==='pending' ? 'warning' : 'danger')}>{r.status}</span></td><td>{r.created_school_id ? 'Yes' : 'No'}</td><td><div style={{display:'flex', gap:8, flexWrap:'wrap'}}>{r.status !== 'approved' && <button className="btn success" disabled={!isSuperAdmin} onClick={()=>handleSchoolApproval(r.id, 'approved')}>Approve</button>}{r.status !== 'denied' && <button className="btn secondary" disabled={!isSuperAdmin} onClick={()=>handleSchoolApproval(r.id, 'denied')}>Deny</button>}<button className="btn danger" disabled={!isSuperAdmin} onClick={()=>handlePermanentDeleteRegistration(r.id, r.school_name, r.status)}>Permanent Delete</button></div></td></tr>)}
                </tbody></table></div>
              </div>
            )}

            {page === 'licenses' && (
              <div className="card">
                <h3>License Management</h3>
                <div className="table-wrap"><table><thead><tr><th>School</th><th>State</th><th>Start</th><th>End</th><th>Reminder Days</th><th>Extend</th></tr></thead><tbody>
                  {schoolsHook.rows.map(s => <tr key={s.id}><td>{s.name}</td><td>{s.license_state}</td><td>{formatDate(s.license_start_date)}</td><td>{formatDate(s.license_end_date)}</td><td>{s.license_reminder_days}</td><td><div style={{display:'flex', gap:8, flexWrap:'wrap'}}>{[1,2,3,5,10].map(y => <button key={y} className="btn secondary" onClick={()=>handleLicenseUpdate(s.id, y, false)}>+{y}Y</button>)}</div></td></tr>)}
                </tbody></table></div>
              </div>
            )}
            {page === 'system-control' && renderSystemControlPage()}

            {page === 'dashboard' && (
              <div className="grid">
                <MetricCards items={[
                  { label: 'Total Students', value: dashboardMetrics.studentCount },
                  { label: 'Total Teachers', value: dashboardMetrics.teacherCount },
                  { label: 'Total Parents', value: dashboardMetrics.parentCount },
                  { label: 'Accounts Office Staff', value: dashboardMetrics.accountsCount },
                  { label: 'Total Principals', value: dashboardMetrics.principalCount },
                  { label: 'Total Classes Summary', value: dashboardMetrics.classCount },
                  { label: 'Attendance Summary', value: attendanceHook.rows.length },
                  { label: 'Recently Created Accounts', value: dashboardMetrics.recentAccounts }
                ]} />
                <div className="grid cards-3">
                  <div className="card">
                    <h3>Class Summary</h3>
                    {classesHook.rows.length === 0 ? <div className="empty">No classes added yet</div> : classesHook.rows.slice(0, 10).map(cls => <div key={cls.id} style={{padding:'10px 0', borderBottom:'1px solid #e2e8f0'}}><strong>{buildClassDisplay(cls) || cls.class_name || cls.name}</strong><div className="subtle">Capacity: {cls.capacity || '-'}</div></div>)}
                  </div>
                  <div className="card">
                    <h3>Attendance Summary</h3>
                    <div style={{display:'grid', gap:10}}>
                      <div><strong>Present:</strong> {dashboardMetrics.attendancePresent}</div>
                      <div><strong>Absent:</strong> {dashboardMetrics.attendanceAbsent}</div>
                      <div><strong>Late:</strong> {dashboardMetrics.attendanceLate}</div>
                      <div className="subtle">All attendance records update this summary automatically.</div>
                    </div>
                  </div>
                  <div className="card">
                    <h3>Recently Created Accounts</h3>
                    {dashboardRecentAccounts.length === 0 ? <div className="empty">No recently created user accounts</div> : dashboardRecentAccounts.map(item => <div key={item.id} style={{padding:'10px 0', borderBottom:'1px solid #e2e8f0'}}><strong>{item.full_name}</strong><div className="subtle">{item.role_name} | Username: {item.username || '-'}</div><div className="subtle">Issued: {formatDate(item.issued_at)}</div></div>)}
                  </div>
                </div>
              </div>

            {page === 'principal-dashboard' && (
              <div className="grid">
                {renderWelcomeCard()}
                <MetricCards items={[
                  { label: 'Total Students', value: mergedStudentsRows.length },
                  { label: 'Total Teachers', value: mergedTeachersRows.length },
                  { label: 'Total Subjects', value: principalSubjectNames.length },
                  { label: 'Attendance Records', value: principalAttendanceOverview.total }
                ]} />

                <div className="grid cards-2">
                  <div className="card">
                    <h3>Student Attendance Overview</h3>
                    <div style={{display:'grid', gap:10}}>
                      <div><strong>Total Records:</strong> {principalAttendanceOverview.total}</div>
                      <div><strong>Present:</strong> {principalAttendanceOverview.present}</div>
                      <div><strong>Absent:</strong> {principalAttendanceOverview.absent}</div>
                      <div><strong>Late:</strong> {principalAttendanceOverview.late}</div>
                    </div>
                  </div>
                  <div className="card">
                    <h3>Student Performance Overview</h3>
                    <div style={{display:'grid', gap:10}}>
                      <div><strong>Grade Entries:</strong> {principalPerformanceOverview.gradeEntries}</div>
                      <div><strong>Students Covered:</strong> {principalPerformanceOverview.uniqueStudents}</div>
                      <div><strong>Overall Average:</strong> {principalPerformanceOverview.overallAverage}</div>
                    </div>
                  </div>
                </div>

                <div className="grid cards-2">
                  <div className="card">
                    <h3>Total Subjects</h3>

                  if (!trimmedClassName) {
                    setNotice({ type: 'danger', text: 'Class Name is required.' });
                    return;
                  }
                  if (!school?.id) {
                    setNotice({ type: 'danger', text: 'School context was not found. Please log in again.' });
                    return;
                  }

                  const normalizedClassName = normalizeMainClassName(trimmedClassName) || trimmedClassName;
                  const inferredLevelGroup = normalizedClassName.startsWith('Nursery')
                    ? 'Nursery'
                    : normalizedClassName.startsWith('KG')
                    ? 'Kindergarten'
                    : normalizedClassName.startsWith('Class')
                    ? 'Primary'
                    : normalizedClassName.startsWith('JHS')
                    ? 'JHS'
                    : null;

                  const parsedCapacity = classForm.capacity === '' || classForm.capacity == null || Number.isNaN(Number(classForm.capacity))
                    ? null
                    : Number(classForm.capacity);

                  const candidatePayloads = [
                    { name: trimmedClassName, class_name: trimmedClassName, capacity: parsedCapacity, school_id: school.id },
                    { name: trimmedClassName, capacity: parsedCapacity, school_id: school.id },
                    { name: trimmedClassName, class_name: trimmedClassName, level_group: inferredLevelGroup, section: 'None', capacity: parsedCapacity, school_id: school.id },
                    { name: trimmedClassName, level_group: inferredLevelGroup, section: 'None', capacity: parsedCapacity, school_id: school.id }
                  ];

                  setNotice({ type: '', text: '' });

                  let lastError = null;

                  for (const candidate of candidatePayloads) {
                    const payload = { ...candidate };
                    if (payload.level_group == null) delete payload.level_group;

                    try {
                      const res = classForm.id
                        ? await supabaseClient
                            .from('classes')
                            .update(payload)

                            .eq('school_id', school.id)
                            .select()
                        : await supabaseClient
                            .from('classes')
                            .insert(payload)
                            .select();

                        setClassForm({ id: '', class_name: '', capacity: '' });
                        await classesHook.fetchRows();
                        await refreshAll();
                        setNotice({ type: 'success', text: 'Class saved successfully.' });
                        return;
                      }

                      lastError = res.error;
                    } catch (error) {
                      lastError = error;
                    }
                  }

                  setNotice({
                    type: 'danger',
                    text: lastError?.message || 'Failed to save class. Please check the classes table columns and policies.'
                  });
                }}

                      <div className="field"><label>Amount Paid</label><input type="number" value={feeForm.amount_paid} onChange={(e)=>setFeeForm({...feeForm, amount_paid:e.target.value})} /></div>
                      <div className="field"><label>Payment Date</label><input type="date" value={feeForm.payment_date} onChange={(e)=>setFeeForm({...feeForm, payment_date:e.target.value})} /></div>
                      <div className="field"><label>Method</label><input value={feeForm.payment_method} onChange={(e)=>setFeeForm({...feeForm, payment_method:e.target.value})} /></div>
                      <div className="field"><label>Status</label><select value={feeForm.payment_status} onChange={(e)=>setFeeForm({...feeForm, payment_status:e.target.value})}>{paymentStatusOptions.map(x => <option key={x}>{x}</option>)}</select></div>
                      <div className="field"><label>Remarks</label><input value={feeForm.remarks} onChange={(e)=>setFeeForm({...feeForm, remarks:e.target.value})} /></div>
                    </div>
                    <div style={{marginTop:16}}><button className="btn" onClick={()=>saveEntity('fee_payments', feeForm, ()=>setFeeForm({ id:'', student_id:'', term_name:'Term 1', academic_year:getAcademicYearLabel(), amount_due:0, amount_paid:0, payment_date:todayISO(), payment_method:'Cash', payment_status:'Unpaid', remarks:'' }), { recorded_by_profile_id: profile.id })}>Save Payment</button></div>
                  </div>
                )}
                <div className="card">
                  <h3>Fee Statements</h3>
                  <div className="toolbar">
                    <button className="btn secondary" onClick={()=>{ setSelectedReport('fee'); setPage('reports'); }}>Printable Fee Statement View</button>
                    <button className="btn secondary" onClick={()=>exportCsv(feesHook.rows, 'fee-payments.csv')}>Export CSV</button>
                  </div>
                  <div className="table-wrap"><table><thead><tr><th>Student</th><th>Term</th><th>Year</th><th>Due</th><th>Paid</th><th>Balance</th><th>Status</th></tr></thead><tbody>{feesHook.rows.map(r => <tr key={r.id} onClick={()=>setCurrentStudent({ full_name: r.student_name, class_name: r.class_name, student_id: r.student_id })}><td>{r.student_name}</td><td>{r.term_name}</td><td>{r.academic_year}</td><td>{formatCurrency(r.amount_due)}</td><td>{formatCurrency(r.amount_paid)}</td><td>{formatCurrency(r.balance)}</td><td>{r.payment_status}</td></tr>)}</tbody></table></div>
                </div>
              </div>
            )}

            {page === 'reports' && <ReportsView school={school} selectedReport={selectedReport} gradeRows={gradesHook.rows.filter(r => !currentStudent || r.student_id === currentStudent.student_id)} feeRows={feesHook.rows.filter(r => !currentStudent || r.student_id === currentStudent.student_id)} currentStudent={currentStudent} />}

            {page === 'chat' && (
              <div className="grid cards-2">
                <div className="card">
                  <h3>Chat</h3>
                  <div className="chat-box">
                    {chatHook.rows.slice().reverse().map(m => <div key={m.id} className={classNames('msg', m.sender_profile_id === profile.id && 'mine')}><div className="bubble"><strong>{m.sender_name}</strong><div>{m.message_text}</div><div className="subtle" style={{fontSize:12, marginTop:4}}>{new Date(m.created_at).toLocaleString()}</div></div></div>)}
                  </div>
                </div>
                <div className="card">
                  <h3>Send Message</h3>
                  <div className="field"><label>Recipient Profile ID</label><input value={chatForm.recipient_profile_id} onChange={(e)=>setChatForm({...chatForm, recipient_profile_id:e.target.value})} /></div>
                  <div className="field"><label>Message</label><textarea rows="6" value={chatForm.message_text} onChange={(e)=>setChatForm({...chatForm, message_text:e.target.value})}></textarea></div>
                  <div style={{marginTop:16}}><button className="btn" onClick={()=>saveEntity('chat_messages', chatForm, ()=>setChatForm({ recipient_profile_id:'', message_text:'' }), { sender_profile_id: profile.id })}>Send</button></div>
                  <p className="footer-note">Monitoring rules are enforced in SQL policies and views. Student to student chat is restricted to JHS same class. Admin monitors all. Teachers monitor assigned classes. Principal has no chat monitoring access.</p>
                </div>
              </div>
            )}

            {page === 'notifications' && (
              <div className="grid cards-2">
                {(role === ROLE.ADMIN || role === ROLE.SUPER_ADMIN) && <div className="card"><h3>Send Notification</h3><div className="field"><label>Title</label><input value={notificationForm.title} onChange={(e)=>setNotificationForm({...notificationForm, title:e.target.value})} /></div><div className="field"><label>Message</label><textarea rows="5" value={notificationForm.message} onChange={(e)=>setNotificationForm({...notificationForm, message:e.target.value})}></textarea></div><div className="field"><label>Audience Role</label><input value={notificationForm.audience_role} onChange={(e)=>setNotificationForm({...notificationForm, audience_role:e.target.value})} /></div><div style={{marginTop:16}}><button className="btn" onClick={()=>saveEntity('notifications', notificationForm, ()=>setNotificationForm({ id:'', title:'', message:'', audience_role:'all' }), { created_by_profile_id: profile.id })}>Publish Notification</button></div></div>}
                <div className="card"><h3>Notifications Feed</h3>{notificationsHook.rows.map(n => <div key={n.id} style={{padding:'12px 0', borderBottom:'1px solid #e2e8f0'}}><strong>{n.title}</strong><div>{n.message}</div><div className="subtle">Audience: {n.audience_role} | {new Date(n.created_at).toLocaleString()}</div></div>)}</div>
              </div>
            )}

            {page === 'audit-log' && (
              <div className="card">
                <h3>Audit Log</h3>
                <div className="table-wrap"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Table</th><th>Record</th><th>Summary</th></tr></thead><tbody>{auditHook.rows.map(r => <tr key={r.id}><td>{new Date(r.created_at).toLocaleString()}</td><td>{r.actor_name || r.actor_profile_id}</td><td>{r.action_type}</td><td>{r.table_name}</td><td>{r.record_id}</td><td>{r.summary}</td></tr>)}</tbody></table></div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
