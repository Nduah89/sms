                      </thead>
                      <tbody>
                        {visibleFeeRows.length === 0 && <tr><td colSpan="9"><div className="empty">No fee records found</div></td></tr>}
                        {visibleFeeRows.map((r) => (
                          <tr key={r.id}>
                            <td>{r.student_name || '-'}</td>
                            <td>{r.class_name || classNameMap[r.class_id] || '-'}</td>
                            <td>{r.term_name || '-'}</td>
                            <td>{renderFeeAmount('due', r.amount_due)}</td>
                            <td>{renderFeeAmount('paid', r.amount_paid)}</td>
                            <td>{renderFeeAmount('balance', r.balance)}</td>
                            <td><span className={classNames('chip', String(r.payment_status || '').trim() === 'Paid' ? 'success' : String(r.payment_status || '').trim() === 'Partially Paid' ? 'warning' : String(r.payment_status || '').trim() === 'Archived' ? 'info' : 'danger')}>{r.payment_status || '-'}</span></td>
                            <td>{r.payment_method || '-'}</td>
                            <td>
                              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                                <button className="btn secondary" onClick={() => openFeeStatementForRow(r)}>Print</button>
                                {(role === ROLE.ADMIN || role === ROLE.ACCOUNTS) && <button className="btn" onClick={() => openFeeEditor(r)}>Edit</button>}
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {page === 'reports' && <ReportsView school={school} selectedReport={selectedReport} gradeRows={gradesHook.rows.filter(r => !currentStudent || r.student_id === currentStudent.student_id)} feeRows={visibleFeeRows.filter(r => !currentStudent || r.student_id === currentStudent.student_id)} currentStudent={currentStudent} />}

            {page === 'chat' && (
              <div className={classNames('chat-layout', role === ROLE.ADMIN && 'monitor-only', role !== ROLE.ADMIN && role !== ROLE.TEACHER && 'no-monitor')}>
                {role !== ROLE.ADMIN && (
                  <div className="card chat-sidebar">
                    <div className="chat-panel-cap">
                      <div>
                        <h3 className="chat-section-title">Chat</h3>
                        <div className="subtle">{chatRuleDescription(role)}</div>
                      </div>
                      <span className="chat-status-chip">
                        <span className={classNames('chat-user-status', isPresenceActive(chatDirectoryMap.get(String(profile?.id || '').trim())) ? 'online' : 'offline')} />
                        {getPresenceStateLabel(chatDirectoryMap.get(String(profile?.id || '').trim()))}
                      </span>
                    </div>
                    {role === ROLE.STUDENT && (
                      <>
                        <div className="chat-tab-switch">
                          <button type="button" className={classNames('chat-tab-btn', studentChatTab === 'students' && 'active')} onClick={() => setStudentChatTab('students')}>Students</button>
                          <button type="button" className={classNames('chat-tab-btn', studentChatTab === 'teachers' && 'active')} onClick={() => setStudentChatTab('teachers')}>Teachers</button>
                        </div>
                        <div className="toolbar" style={{ marginBottom: 14 }}>
                          <div className="field-inline">
                            <label>Class Filter</label>
                            <select value={studentChatClassId} onChange={(event) => setStudentChatClassId(event.target.value)}>
                              {studentChatClassOptionsForTabs.length === 0 ? <option value="">No Class</option> : studentChatClassOptionsForTabs.map((option) => <option key={option.value} value={option.value}>{option.label}</option>)}
                            </select>
                          </div>
                          <div className="field-inline">
                            <label>{studentChatTab === 'teachers' ? 'Teacher' : 'Student'}</label>
                            <select
                              value={activeChatContactOptions.some((contact) => String(contact.profile_id || '').trim() === String(chatForm.recipient_profile_id || '').trim()) ? chatForm.recipient_profile_id : ''}
                              onChange={(event) => setChatForm((current) => ({ ...current, recipient_profile_id: event.target.value }))}
                            >
                              <option value="">{studentChatTab === 'teachers' ? 'Select teacher' : 'Select student'}</option>
                              {activeChatContactOptions.map((contact) => <option key={`${contact.profile_id}-${String(contact.class_id || '')}`} value={contact.profile_id}>{contact.full_name}{contact.class_name ? ` (${contact.class_name})` : ''}</option>)}
                            </select>
                          </div>
                        </div>
                      </>
                    )}
                    {role === ROLE.PARENT && (
                      <div className="toolbar" style={{ marginBottom: 14 }}>
                        <div className="field-inline">
                          <label>Filter Teacher by Class</label>
                          <select value={parentChatClassId} onChange={(event) => setParentChatClassId(event.target.value)}>
                            {parentChatClassOptions.length === 0 ? <option value="">No Linked Class</option> : parentChatClassOptions.map((option) => <option key={option.value || 'parent-chat-class-all'} value={option.value}>{option.label}</option>)}
                          </select>
                        </div>
                      </div>
                    )}
                    {role === ROLE.TEACHER && (
                      <>
                        <div className="chat-tab-switch">
                          <button type="button" className={classNames('chat-tab-btn', teacherChatTab === 'students' && 'active')} onClick={() => setTeacherChatTab('students')}>Students</button>
                          <button type="button" className={classNames('chat-tab-btn', teacherChatTab === 'parents' && 'active')} onClick={() => setTeacherChatTab('parents')}>Parents</button>
                        </div>
                        <div className="toolbar" style={{ marginBottom: 14 }}>
                          <div className="field-inline">
                            <label>Class Filter</label>
                            <select value={chatMonitorClassId} onChange={(event) => setChatMonitorClassId(event.target.value)}>
                              {teacherChatClassOptionsForTabs.length === 0 ? <option value="">No Assigned Class</option> : teacherChatClassOptionsForTabs.map((option) => <option key={option.value} value={option.value}>{option.label}</option>)}
                            </select>
                          </div>
                          <div className="field-inline">
                            <label>{teacherChatTab === 'parents' ? 'Parent' : 'Student'}</label>
                            <select
                              value={activeChatContactOptions.some((contact) => String(contact.profile_id || '').trim() === String(chatForm.recipient_profile_id || '').trim()) ? chatForm.recipient_profile_id : ''}
                              onChange={(event) => setChatForm((current) => ({ ...current, recipient_profile_id: event.target.value }))}
                            >
                              <option value="">{teacherChatTab === 'parents' ? 'Select parent' : 'Select student'}</option>
                              {activeChatContactOptions.map((contact) => <option key={`${contact.profile_id}-${String(contact.class_id || '')}`} value={contact.profile_id}>{contact.full_name}{contact.class_name ? ` (${contact.class_name})` : ''}</option>)}
                            </select>
                          </div>
                        </div>
                      </>
                    )}
                    <div className="field-inline" style={{ marginBottom: 14 }}>
                      <label>Search contact</label>
                      <input
                        className="chat-search-input"
                        value={chatMonitorSearch}
                        onChange={(event) => setChatMonitorSearch(event.target.value)}
                        placeholder="Search by name, role, or class"
                      />
                    </div>
                    <div className="chat-contacts">
                      {(role === ROLE.PARENT || role === ROLE.STUDENT || role === ROLE.TEACHER ? activeChatContactOptions : chatContactOptions).filter((contact) => {
                        const q = String(chatMonitorSearch || '').trim().toLowerCase();
                        if (!q) return true;
                        return [contact.full_name, contact.role_name, contact.class_name, contact.note].some((value) => String(value || '').toLowerCase().includes(q));
                      }).length === 0 ? <div className="empty">No chat contacts are available for this account yet.</div> : (role === ROLE.PARENT || role === ROLE.STUDENT || role === ROLE.TEACHER ? activeChatContactOptions : chatContactOptions).filter((contact) => {
                        const q = String(chatMonitorSearch || '').trim().toLowerCase();
                        if (!q) return true;
                        return [contact.full_name, contact.role_name, contact.class_name, contact.note].some((value) => String(value || '').toLowerCase().includes(q));
                      }).map((contact) => {
                        const contactId = String(contact.profile_id || '').trim();
                        const unread = chatUnreadByContact[contactId] || 0;
                        const contactPresence = chatDirectoryMap.get(contactId);
                        const initials = String(contact.full_name || 'U').split(/\s+/).filter(Boolean).slice(0, 2).map((part) => part[0]).join('').toUpperCase() || 'U';
                        const isOnline = isPresenceActive(contactPresence);
                        return (
                          <button key={`${contactId}-${String(contact.class_id || '')}`} className={classNames('chat-contact-btn', String(chatForm.recipient_profile_id || '').trim() === contactId && 'active')} onClick={() => setChatForm((current) => ({ ...current, recipient_profile_id: contactId }))}>
                            <div className="chat-contact-row">
                              <div className="chat-avatar sm">{initials}</div>
                              <div style={{ flex:1, minWidth:0 }}>
                                <div className="chat-contact-title">
                                  <strong>{contact.full_name || '-'}</strong>
                                  {unread > 0 ? <span className="chat-unread-pill">{unread}</span> : <span className="chat-contact-date">{isOnline ? 'online' : 'offline'}</span>}
                                </div>
                                <div className="chat-header-status">
                                  <span className={classNames('chat-user-status', isOnline ? 'online' : 'offline')} />
                                  <span>{contact.role_name}{contact.class_name ? ` | ${contact.class_name}` : ''}</span>
                                </div>
                                <div className="chat-contact-snippet">{contact.note || chatTypeLabel(deriveChatTypeFromRoles(role, contact.role_name))}</div>
                              </div>
                              {role === ROLE.PARENT ? <span className="chat-action-icon" aria-hidden="true">💬</span> : null}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}

                {role !== ROLE.ADMIN && (
                  <div className="card chat-thread-panel">
                    <div className="chat-thread-topbar">
                      <div className="chat-avatar-row">
                        <div className="chat-avatar">{String(currentChatRecipient?.full_name || 'C').split(/\s+/).filter(Boolean).slice(0, 2).map((part) => part[0]).join('').toUpperCase() || 'C'}</div>
                        <div>
                          <h3 style={{ margin:'0 0 4px' }}>{currentChatRecipient ? currentChatRecipient.full_name : 'Select a contact'}</h3>
                          <div className="chat-header-status">
                            <span className={classNames('chat-user-status', currentChatRecipient && isPresenceActive(chatDirectoryMap.get(String(currentChatRecipient.profile_id || '').trim())) ? 'online' : 'offline')} />
                            <span>{currentChatRecipient ? `${getPresenceStateLabel(chatDirectoryMap.get(String(currentChatRecipient.profile_id || '').trim()))}, ${currentChatRecipient.role_name}${currentChatRecipient.class_name ? ` | ${currentChatRecipient.class_name}` : ''}` : 'Choose a contact from the selected tab and class to start chatting.'}</span>
                          </div>
                        </div>
                      </div>
                      <div className="chat-thread-actions">
                        {chatUnreadCount > 0 ? <span className="chip info">{chatUnreadCount} unread</span> : <span className="chip success">Up to date</span>}
                        <button className="btn secondary" onClick={markChatSeen}>Mark Chat Seen</button>
                      </div>
                    </div>

                    {currentChatRecipient ? (
                      <>
                        <div className="chat-thread-surface">
                          <VirtualizedChatList
                            messages={currentConversationMessages}
                            currentProfileId={profile.id}
                            canDeleteForMe={true}
                            onDeleteForMe={handleHideChatMessageForCurrentUser}
                            canPermanentDelete={false}
                            onPermanentDelete={() => {}}
                            getPresenceStateLabel={getPresenceStateLabel}
                            isPresenceActive={isPresenceActive}
                            resolveProfileMeta={(profileId) => chatDirectoryMap.get(String(profileId || '').trim())}
                          />
                        </div>
                        <div className="chat-compose">
                          <div className="chat-compose-panel">
                            <div className="chat-compose-toolbar">
                              <div className="chat-composer-actions">
                                <button className="chat-round-btn" type="button" onClick={() => setShowEmojiPanel((current) => !current)} title="More emoji">😊</button>
                                <button
                                  className={classNames('chat-record-btn', isRecordingAudio && 'recording')}
                                  type="button"
                                  onMouseDown={handleStartChatAudioRecording}
                                  onMouseUp={() => handleStopChatAudioRecording(true)}
                                  onMouseLeave={() => isRecordingAudio && handleStopChatAudioRecording(false)}
                                  onTouchStart={handleStartChatAudioRecording}
                                  onTouchEnd={() => handleStopChatAudioRecording(true)}
                                >
                                  {isRecordingAudio ? 'Release to send audio' : 'Hold to record audio'}
                                </button>
                                <button className="chat-round-btn" type="button" onClick={() => setChatForm((current) => ({ ...current, message_text: '' }))} title="Clear text">🧹</button>
                              </div>
                              <div className="chat-recording-meta">
                                {isRecordingAudio ? <><span>🎙️ Recording</span><strong>{recordingDurationSec}s</strong></> : <span>Realtime text, emoji, and audio chat</span>}
                              </div>
                            </div>
                            {audioRecorderError ? <div className="banner danger" style={{ marginTop: 12, marginBottom: 0 }}>{audioRecorderError}</div> : null}
                            {showEmojiPanel ? (
                              <div className="chat-emoji-panel">
                                {['😀','😁','😂','🤣','😊','😍','😘','😎','🤩','😮','😢','😭','😡','👍','👏','🙏','🎉','🔥','❤️','💙','💚','💯','✅','❗','📚','🧠','📝','🎓','🏫','👨‍🏫','👩‍🏫','👨‍🎓','👩‍🎓'].map((emoji) => (
                                  <button key={emoji} className="emoji-btn" type="button" onClick={() => insertEmojiIntoChat(emoji)}>{emoji}</button>
                                ))}
                              </div>
                            ) : null}
                            <div className="chat-input-shell">
                              <textarea className="chat-textarea" value={chatForm.message_text} onChange={(event) => setChatForm({ ...chatForm, message_text: event.target.value })} placeholder="Type something..." />
                            </div>
                            <div className="chat-compose-toolbar">
                              <div className="chat-header-status">
                                <span className={classNames('chat-user-status', currentChatRecipient && isPresenceActive(chatDirectoryMap.get(String(currentChatRecipient.profile_id || '').trim())) ? 'online' : 'offline')} />
                                <span>{currentChatRecipient ? `${currentChatRecipient.full_name} is ${getPresenceStateLabel(chatDirectoryMap.get(String(currentChatRecipient.profile_id || '').trim()))}` : 'No user selected'}</span>
                              </div>
                              <div className="chat-composer-actions">
                                <button className="btn secondary" type="button" onClick={() => setShowEmojiPanel((current) => !current)}>More Emoji</button>
                                <button className="chat-send-btn" type="button" onClick={() => handleSendSystemChatMessage()}>Send Message</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="chat-empty-state">Choose a contact to open the conversation.</div>
                    )}
                  </div>
                )}

                {(role === ROLE.ADMIN || role === ROLE.TEACHER) ? (
                  <div className="card chat-monitor-panel">
                    <h3 style={{ marginTop:0 }}>{role === ROLE.ADMIN ? 'Student Chat Monitor' : 'Student Chat Monitor and Teacher Reply'}</h3>
                    <p className="subtle">Filter by class and review student to student messages. Teachers can quick reply to students. School admins can allow or disallow students and permanently delete student to student messages.</p>
                    <div className="toolbar">
                      <div className="field-inline">
                        <label>Class Filter</label>
                        <select value={chatMonitorClassId} onChange={(event) => setChatMonitorClassId(event.target.value)}>
                          {chatMonitorClassOptions.map((option) => <option key={option.value || 'all-classes'} value={option.value}>{option.label}</option>)}
                        </select>
                      </div>
                      <div className="field-inline">
                        <label>Search Messages</label>
                        <input className="chat-search-input" value={chatMonitorSearch} onChange={(event) => setChatMonitorSearch(event.target.value)} placeholder="Search by student or message text" />
                      </div>
                    </div>
                    <div className="chat-monitor-list">
                      {monitoredStudentChatMessages.length === 0 ? <div className="empty">No monitored student chats found for the selected class.</div> : monitoredStudentChatMessages.map((message) => {
                        const senderPermission = chatPermissionByStudentProfileId.get(String(message.sender_profile_id || '').trim());
                        const recipientPermission = chatPermissionByStudentProfileId.get(String(message.recipient_profile_id || '').trim());
                        const senderAllowed = senderPermission ? senderPermission.is_allowed !== false : true;
                        const recipientAllowed = recipientPermission ? recipientPermission.is_allowed !== false : true;
                        return (
                          <div key={message.id} className="chat-monitor-item">
                            <div className="chat-monitor-item-head">
                              <div>
                                <strong>{message.sender_name}</strong>
                                <div className="subtle">to {message.recipient_name}</div>
                                <div className="subtle">{message.class_name || '-'} | {new Date(message.created_at).toLocaleString()}</div>
                              </div>
                              <span className="chat-contact-role">{chatTypeLabel(message.chat_type)}</span>
                            </div>
                            <div className="chat-monitor-message">{message.message_text}</div>
                            <div className="chat-monitor-actions">
                              {role === ROLE.TEACHER && <button className="icon-btn" onClick={() => quickReplyToChatStudent(message.sender_profile_id)}>Reply to Sender</button>}
                              {role === ROLE.TEACHER && <button className="icon-btn" onClick={() => quickReplyToChatStudent(message.recipient_profile_id)}>Reply to Recipient</button>}
                              {role === ROLE.ADMIN && <button className={classNames('icon-btn', senderAllowed ? 'warning' : '')} onClick={() => handleToggleStudentChatPermission(message.sender_profile_id, !senderAllowed)}>{senderAllowed ? 'Disallow Sender' : 'Allow Sender'}</button>}
                              {role === ROLE.ADMIN && <button className={classNames('icon-btn', recipientAllowed ? 'warning' : '')} onClick={() => handleToggleStudentChatPermission(message.recipient_profile_id, !recipientAllowed)}>{recipientAllowed ? 'Disallow Recipient' : 'Allow Recipient'}</button>}
                              {role === ROLE.ADMIN && <button className="icon-btn danger" onClick={() => handlePermanentDeleteChatMessage(message)}>Delete Permanently</button>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {role === ROLE.ADMIN && (
                      <div style={{ marginTop:16 }}>
                        <h4 style={{ margin:'0 0 10px' }}>Student Chat Status</h4>
                        <div className="chat-rule-list">
                          {monitoredStudentParticipants.length === 0 ? <div className="empty">No students to manage in this filter.</div> : monitoredStudentParticipants.map((student) => {
                            const permission = chatPermissionByStudentProfileId.get(String(student.profile_id || '').trim());
                            const isAllowed = permission ? permission.is_allowed !== false : true;
                            return (
                              <div key={student.profile_id} className="chat-rule-item">
                                <div style={{ display:'flex', justifyContent:'space-between', gap:10, flexWrap:'wrap' }}>
                                  <div>
                                    <strong>{student.full_name}</strong>
                                    <div className="subtle">{student.class_name || '-'}</div>
                                  </div>
                                  <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                                    <span className={classNames('chip', isAllowed ? 'success' : 'danger')}>{isAllowed ? 'Allowed' : 'Disallowed'}</span>
                                    <button className={classNames('icon-btn', isAllowed ? 'warning' : '')} onClick={() => handleToggleStudentChatPermission(student.profile_id, !isAllowed)}>{isAllowed ? 'Disallow' : 'Allow'}</button>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  role !== ROLE.ADMIN && (
                    <div className="card chat-monitor-panel">
                      <h3 style={{ marginTop:0 }}>Chat Rules and Notifications</h3>
                      <div className="chat-rule-list">
                        <div className="chat-rule-item">Unread messages show as blue badges beside the System Chat tab and beside each contact name.</div>
                        <div className="chat-rule-item">Messages stay stored in the system unless a user chooses Delete for Me. Student to student messages can be permanently deleted only by the school admin.</div>
                        <div className="chat-rule-item">Student to student chat is restricted to JHS students in the same class. Student to teacher, parent to teacher, and principal to teacher chats follow their role permissions automatically.</div>
                      </div>
                    </div>
                  )
                )}
              </div>
            )}


            {page === 'notifications' && (
              <div className="grid cards-2">
                {(role === ROLE.ADMIN || role === ROLE.SUPER_ADMIN) && <div className="card"><h3>Send Notification</h3><div className="field"><label>Title</label><input value={notificationForm.title} onChange={(e)=>setNotificationForm({...notificationForm, title:e.target.value})} /></div><div className="field"><label>Message</label><textarea rows="5" value={notificationForm.message} onChange={(e)=>setNotificationForm({...notificationForm, message:e.target.value})}></textarea></div><div className="field"><label>Audience Role</label><input value={notificationForm.audience_role} onChange={(e)=>setNotificationForm({...notificationForm, audience_role:e.target.value})} /></div><div style={{marginTop:16}}><button className="btn" onClick={()=>saveEntity('notifications', notificationForm, ()=>setNotificationForm({ id:'', title:'', message:'', audience_role:'all' }), { created_by_profile_id: profile.id })}>Publish Notification</button></div></div>}
                <div className="card"><h3>Notifications Feed</h3>{notificationsHook.rows.map(n => <div key={n.id} style={{padding:'12px 0', borderBottom:'1px solid #e2e8f0'}}><strong>{n.title}</strong><div>{n.message}</div><div className="subtle">Audience: {n.audience_role} | {new Date(n.created_at).toLocaleString()}</div></div>)}</div>
              </div>
            )}

            {page === 'audit-log' && (
              <div className="card">
                <h3>Audit Log</h3>
                <div className="table-wrap"><table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Table</th><th>Record</th><th>Summary</th></tr></thead><tbody>{auditHook.rows.map(r => <tr key={r.id}><td>{new Date(r.created_at).toLocaleString()}</td><td>{r.actor_name || r.actor_profile_id}</td><td>{r.action_type}</td><td>{r.table_name}</td><td>{r.record_id}</td><td>{r.summary}</td></tr>)}</tbody></table></div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
